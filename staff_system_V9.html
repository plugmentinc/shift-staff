<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>シフト＆タイムカード V9</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&family=DM+Mono:wght@400;500&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-gradient: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 40%, #F3E8FF 100%);
  --bg-orb-1: radial-gradient(circle, rgba(139,92,246,.35) 0%, transparent 70%);
  --bg-orb-2: radial-gradient(circle, rgba(99,102,241,.3) 0%, transparent 70%);
  --bg-orb-3: radial-gradient(circle, rgba(236,72,153,.25) 0%, transparent 70%);
  --glass-bg: rgba(255,255,255,.65);
  --glass-bg-strong: rgba(255,255,255,.85);
  --glass-border: rgba(255,255,255,.6);
  --glass-shadow: 0 8px 32px rgba(99,102,241,.12);
  --glass-shadow-lg: 0 20px 60px rgba(99,102,241,.18);
  --text-primary: #0F172A;
  --text-secondary: #475569;
  --text-tertiary: #94A3B8;
  --text-muted: #CBD5E1;
  --accent: #6366F1;
  --accent-2: #8B5CF6;
  --accent-gradient: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #EC4899 100%);
  --success: #059669;
  --success-bg: rgba(5,150,105,.12);
  --warning: #F59E0B;
  --warning-bg: rgba(245,158,11,.12);
  --danger: #DC2626;
  --danger-bg: rgba(220,38,38,.12);
  --info: #3B82F6;
  --info-bg: rgba(59,130,246,.12);
  --border: rgba(148,163,184,.2);
  --border-strong: rgba(148,163,184,.35);
  --surface: rgba(248,250,252,.7);
  --input-bg: rgba(255,255,255,.5);
  --hover-bg: rgba(99,102,241,.08);
}
[data-theme="dark"] {
  --bg-gradient: linear-gradient(135deg, #0F0B2E 0%, #1A1545 40%, #2E1065 100%);
  --bg-orb-1: radial-gradient(circle, rgba(139,92,246,.4) 0%, transparent 70%);
  --bg-orb-2: radial-gradient(circle, rgba(99,102,241,.35) 0%, transparent 70%);
  --bg-orb-3: radial-gradient(circle, rgba(236,72,153,.3) 0%, transparent 70%);
  --glass-bg: rgba(30,27,75,.55);
  --glass-bg-strong: rgba(30,27,75,.8);
  --glass-border: rgba(255,255,255,.1);
  --glass-shadow: 0 8px 32px rgba(0,0,0,.4);
  --glass-shadow-lg: 0 20px 60px rgba(0,0,0,.5);
  --text-primary: #F1F5F9;
  --text-secondary: #CBD5E1;
  --text-tertiary: #94A3B8;
  --text-muted: #64748B;
  --border: rgba(255,255,255,.1);
  --border-strong: rgba(255,255,255,.2);
  --surface: rgba(15,11,46,.5);
  --input-bg: rgba(15,11,46,.5);
  --hover-bg: rgba(139,92,246,.15);
  --success-bg: rgba(5,150,105,.2);
  --warning-bg: rgba(245,158,11,.2);
  --danger-bg: rgba(220,38,38,.2);
  --info-bg: rgba(59,130,246,.2);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html, body { height:100% }
body {
  min-height:100vh;
  background: var(--bg-gradient);
  font-family:'Inter','Noto Sans JP','Hiragino Kaku Gothic ProN',-apple-system,sans-serif;
  padding-bottom:80px;
  color: var(--text-primary);
  transition: background .4s ease;
  overflow-x:hidden; position:relative;
}
body::before, body::after {
  content:''; position:fixed; pointer-events:none; z-index:0;
  width:600px; height:600px; border-radius:50%;
  filter: blur(80px);
  animation: floatOrb 20s ease-in-out infinite;
}
body::before { background: var(--bg-orb-1); top:-200px; left:-200px; }
body::after { background: var(--bg-orb-2); bottom:-200px; right:-200px; animation-delay:-10s; }
.bg-orb-3 { position:fixed; top:40%; left:50%; width:500px; height:500px; border-radius:50%; background: var(--bg-orb-3); filter: blur(80px); transform: translate(-50%,-50%); pointer-events:none; z-index:0; animation: floatOrb 25s ease-in-out infinite reverse; }
@keyframes floatOrb { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(40px,-50px) scale(1.1)} 66%{transform:translate(-30px,30px) scale(.95)} }
button, input, select, textarea { font-family:inherit; color:inherit; }

.login-wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; position:relative; z-index:1; }
.login-brand { display:flex; align-items:center; gap:14px; margin-bottom:40px; animation: slideDown .6s ease; }
.login-brand-icon { width:56px; height:56px; border-radius:18px; background: var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-size:28px; box-shadow: 0 12px 40px rgba(99,102,241,.5); }
.login-brand-text { color: var(--text-primary); font-size:20px; font-weight:900; letter-spacing:-.02em; }
.login-brand-sub { color: var(--text-tertiary); font-size:11px; letter-spacing:.15em; text-transform:uppercase; margin-top:2px; font-weight:700; }
.login-box { border-radius:28px; padding:40px 32px; width:100%; max-width:420px; animation: slideUp .6s ease; background: var(--glass-bg-strong); backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow-lg); }
.login-box h2 { font-size:24px; font-weight:900; color:var(--text-primary); margin-bottom:6px; text-align:center; letter-spacing:-.02em; }
.login-box .sub { font-size:13px; color:var(--text-tertiary); text-align:center; margin-bottom:28px; }
.role-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
.role-card { border:1.5px solid var(--border); border-radius:16px; padding:20px 14px; cursor:pointer; text-align:center; transition:.25s cubic-bezier(.4,0,.2,1); background: var(--surface); position:relative; overflow:hidden; }
.role-card:hover { transform:translateY(-3px); border-color: var(--accent); box-shadow: 0 12px 30px rgba(99,102,241,.25); }
.role-card.sel { border-color:var(--accent); background: linear-gradient(135deg, rgba(99,102,241,.15), rgba(139,92,246,.15)); transform:translateY(-2px); }
.role-card .ri { font-size:32px; margin-bottom:10px; display:block; }
.role-card .rn { font-size:15px; font-weight:800; color:var(--text-primary); }
.role-card .rd { font-size:11px; color:var(--text-tertiary); margin-top:4px; line-height:1.5; }

.login-fields { display:none; margin-bottom:20px; animation: fadeIn .3s ease; }
.login-fields.show { display:block; }
.fl { margin-bottom:14px; }
.fl label { display:block; font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:8px; }
.fi { width:100%; background: var(--input-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border:1.5px solid var(--border); border-radius:12px; padding:14px 16px; font-size:15px; color:var(--text-primary); outline:none; transition:.2s; }
.fi:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(99,102,241,.12); background: var(--glass-bg-strong); }
.btn-login { width:100%; padding:15px; border-radius:14px; border:none; background: var(--accent-gradient); color:#fff; font-size:15px; font-weight:800; cursor:pointer; transition:.25s; box-shadow: 0 8px 24px rgba(99,102,241,.4); letter-spacing:.02em; }
.btn-login:hover { transform:translateY(-2px); box-shadow: 0 12px 32px rgba(99,102,241,.5); }
.btn-login:disabled { background:var(--border-strong); box-shadow:none; cursor:not-allowed; transform:none; opacity:.6; }
.login-err { color:var(--danger); font-size:13px; text-align:center; margin-top:12px; display:none; padding:10px; border-radius:10px; background: var(--danger-bg); font-weight:700; }

@keyframes slideDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideInRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes spin { to{transform:rotate(360deg)} }

.app { display:none; position:relative; z-index:1; }
.app.on { display:block; }
.topbar { padding:0 20px; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; background: var(--glass-bg-strong); backdrop-filter: blur(24px) saturate(200%); -webkit-backdrop-filter: blur(24px) saturate(200%); border-bottom: 1px solid var(--glass-border); }
.tb-brand { display:flex; align-items:center; gap:10px; color:var(--text-primary); font-size:15px; font-weight:900; letter-spacing:-.01em; }
.tb-brand-icon { width:36px; height:36px; border-radius:10px; background: var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff; box-shadow: 0 4px 14px rgba(99,102,241,.4); }
.tb-right { display:flex; align-items:center; gap:8px; }
.user-pill { display:flex; align-items:center; gap:8px; background: var(--surface); border:1px solid var(--border); border-radius:100px; padding:5px 14px 5px 5px; }
.user-av { width:26px; height:26px; border-radius:50%; background: var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; color:#fff; }
.user-name { color:var(--text-primary); font-size:12px; font-weight:700; }
.btn-out, .btn-icon { background: var(--surface); border:1px solid var(--border); border-radius:10px; padding:7px 12px; color:var(--text-secondary); font-size:12px; font-weight:700; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:4px; }
.btn-out:hover, .btn-icon:hover { background: var(--hover-bg); border-color: var(--accent); color: var(--accent); }
.btn-icon { padding:7px 10px; line-height:1; }
.sync-dot { width:10px; height:10px; border-radius:50%; background:#10B981; display:inline-block; box-shadow: 0 0 10px rgba(16,185,129,.6); }
.sync-dot.syncing { background:#F59E0B; animation:blink 1s infinite; box-shadow: 0 0 10px rgba(245,158,11,.6); }
.sync-dot.err { background:#EF4444; box-shadow: 0 0 10px rgba(239,68,68,.6); }

.notif-btn { position:relative; background: var(--surface); border:1px solid var(--border); border-radius:10px; padding:7px 10px; cursor:pointer; font-size:16px; transition:.2s; }
.notif-btn:hover { background: var(--hover-bg); border-color: var(--accent); }
.notif-badge { position:absolute; top:-4px; right:-4px; background: var(--danger); color:#fff; font-size:10px; font-weight:800; min-width:18px; height:18px; border-radius:9px; display:flex; align-items:center; justify-content:center; padding:0 4px; border:2px solid var(--glass-bg-strong); }
.notif-panel { position:fixed; top:70px; right:16px; width:340px; max-width:calc(100vw - 32px); max-height:70vh; overflow-y:auto; background: var(--glass-bg-strong); backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%); border:1px solid var(--glass-border); border-radius:18px; box-shadow: var(--glass-shadow-lg); display:none; z-index:300; animation: slideInRight .25s ease; }
.notif-panel.show { display:block; }
.notif-header { padding:16px 18px; font-size:14px; font-weight:800; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.notif-item { padding:12px 18px; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:flex-start; transition:.15s; }
.notif-item:hover { background: var(--hover-bg); }
.notif-icon { width:32px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
.notif-content { flex:1; font-size:13px; }
.notif-title { font-weight:700; color:var(--text-primary); }
.notif-sub { font-size:11px; color:var(--text-tertiary); margin-top:2px; }

.tabs-wrap { max-width:720px; margin:0 auto; padding:12px 16px; position:sticky; top:64px; z-index:100; }
.tabs-inner { background: var(--glass-bg-strong); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border:1px solid var(--glass-border); border-radius:16px; padding:5px; display:flex; gap:4px; box-shadow: var(--glass-shadow); overflow-x:auto; scrollbar-width:none; }
.tabs-inner::-webkit-scrollbar { display:none; }
.tbtn { flex:none; padding:10px 15px; border-radius:11px; border:none; background:transparent; color:var(--text-tertiary); font-weight:700; font-size:12px; cursor:pointer; transition:.25s; white-space:nowrap; display:flex; align-items:center; gap:5px; }
.tbtn:hover { background: var(--hover-bg); color:var(--text-secondary); }
.tbtn.on { background: var(--accent-gradient); color:#fff; box-shadow: 0 4px 12px rgba(99,102,241,.4); }
.wrap { max-width:720px; margin:0 auto; padding:0 16px; margin-top:12px; }
.tc { display:none; animation: fadeIn .25s ease; }
.tc.on { display:block; }

.card { background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border:1px solid var(--glass-border); border-radius:20px; padding:18px 22px; box-shadow: var(--glass-shadow); margin-bottom:12px; transition: transform .2s, box-shadow .2s; }
.card:hover { transform: translateY(-2px); box-shadow: var(--glass-shadow-lg); }
.sec-title { font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.empty-s { border-radius:22px; padding:56px 24px; text-align:center; background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border:1px solid var(--glass-border); box-shadow: var(--glass-shadow); }

.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:9999; padding:14px 28px; border-radius:14px; font-weight:800; font-size:14px; box-shadow: 0 16px 40px rgba(0,0,0,.15); display:none; white-space:nowrap; backdrop-filter: blur(20px) saturate(200%); -webkit-backdrop-filter: blur(20px) saturate(200%); border:1px solid var(--glass-border); }
.toast.show { display:block; animation: toastIn .3s ease; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-15px) scale(.9)} to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)} }
.toast.ok { background: rgba(209,250,229,.95); color:#065F46; }
.toast.err { background: rgba(254,226,226,.95); color:#991B1B; }
.toast.inf { background: rgba(219,234,254,.95); color:#1E40AF; }
[data-theme="dark"] .toast.ok { background: rgba(6,95,70,.9); color:#A7F3D0; }
[data-theme="dark"] .toast.err { background: rgba(153,27,27,.9); color:#FECACA; }
[data-theme="dark"] .toast.inf { background: rgba(30,64,175,.9); color:#BFDBFE; }

.clock-hero { background: var(--glass-bg-strong); backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%); border:1px solid var(--glass-border); border-radius:24px; padding:40px 24px; text-align:center; margin-bottom:16px; box-shadow: var(--glass-shadow-lg); position:relative; overflow:hidden; }
.clock-hero::before { content:''; position:absolute; top:-80px; right:-80px; width:240px; height:240px; border-radius:50%; background: radial-gradient(circle, rgba(99,102,241,.2) 0%, transparent 70%); pointer-events:none; animation: floatOrb 15s ease-in-out infinite; }
.clock-hero > * { position:relative; z-index:1; }
.live-time { font-family:'DM Mono',monospace; font-size:64px; font-weight:500; letter-spacing:-3px; line-height:1; margin-bottom:6px; background: var(--accent-gradient); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.live-date { font-size:14px; color:var(--text-tertiary); margin-bottom:32px; font-weight:600; }
.stamp-row { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
.stamp-btn { padding:16px 38px; border-radius:14px; font-size:15px; font-weight:800; border:none; cursor:pointer; display:flex; align-items:center; gap:8px; transition:.2s; letter-spacing:.02em; }
.stamp-in { background: linear-gradient(135deg,#10B981,#059669); color:#fff; box-shadow: 0 8px 24px rgba(16,185,129,.4); }
.stamp-in:hover { transform:translateY(-3px); box-shadow: 0 12px 32px rgba(16,185,129,.5); }
.stamp-out { background: linear-gradient(135deg,#EF4444,#DC2626); color:#fff; box-shadow: 0 8px 24px rgba(239,68,68,.4); }
.stamp-out:hover { transform:translateY(-3px); box-shadow: 0 12px 32px rgba(239,68,68,.5); }
.stamp-btn:active { transform:translateY(0)!important; }
.stamp-btn:disabled { opacity:.35; cursor:not-allowed; transform:none!important; filter: grayscale(.5); }
.status-bar { display:flex; align-items:center; gap:12px; background: linear-gradient(135deg, rgba(16,185,129,.12), rgba(5,150,105,.08)); border:1.5px solid rgba(16,185,129,.3); border-radius:14px; padding:14px 18px; margin-bottom:14px; font-size:13px; color:#059669; font-weight:700; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
[data-theme="dark"] .status-bar { color:#34D399; }
.status-dot { width:10px; height:10px; border-radius:50%; background:#10B981; animation:blink 1.5s infinite; box-shadow: 0 0 12px rgba(16,185,129,.7); }
.shift-today { background: linear-gradient(135deg, rgba(139,92,246,.15), rgba(99,102,241,.1)); border:1.5px solid rgba(139,92,246,.3); border-radius:14px; padding:14px 18px; margin-bottom:14px; display:flex; align-items:center; gap:14px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }

.htable { width:100%; border-collapse:collapse; }
.htable thead th { text-align:left; font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--text-tertiary); padding:12px 14px; background: var(--surface); border-bottom:1.5px solid var(--border); }
.htable tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
.htable tbody tr:hover { background: var(--hover-bg); }
.htable tbody td { padding:13px 14px; font-size:13px; color:var(--text-secondary); font-family:'DM Mono',monospace; }
.htable tbody td.name-c { font-family:'Inter','Noto Sans JP',sans-serif; font-weight:700; color:var(--text-primary); font-size:14px; }
.htable tbody td.hrs-c { color:var(--accent); font-weight:700; }
.my-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
.msc { background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border:1px solid var(--glass-border); border-radius:16px; padding:18px 14px; text-align:center; box-shadow: var(--glass-shadow); transition: transform .2s; }
.msc:hover { transform: translateY(-2px); }
.msv { font-family:'DM Mono',monospace; font-size:26px; font-weight:500; background: var(--accent-gradient); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.msl { font-size:11px; color:var(--text-tertiary); margin-top:4px; font-weight:600; }

.mnav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:8px; }
.nbtn { height:40px; border-radius:12px; border:1px solid var(--border); background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color:var(--text-secondary); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0 16px; font-weight:700; transition:.2s; }
.nbtn:hover { background: var(--hover-bg); border-color: var(--accent); color:var(--accent); }
.ml { font-size:22px; font-weight:900; color:var(--text-primary); text-align:center; letter-spacing:-.02em; }
.subb { font-size:11px; font-weight:800; color:#059669; background: var(--success-bg); padding:3px 10px; border-radius:8px; display:none; margin-top:4px; }
[data-theme="dark"] .subb { color:#34D399; }
.subb.show { display:inline-block; }
.leg { background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border:1px solid var(--glass-border); border-radius:14px; padding:12px 16px; margin-bottom:10px; box-shadow: var(--glass-shadow); }
.legt { font-size:11px; font-weight:800; color:var(--text-tertiary); margin-bottom:8px; letter-spacing:.1em; }
.legi { display:flex; flex-wrap:wrap; gap:6px; }
.legit { display:flex; align-items:center; gap:4px; padding:3px 9px; border-radius:7px; font-size:11px; font-weight:700; }
.cal { background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border:1px solid var(--glass-border); border-radius:20px; padding:16px 12px; box-shadow: var(--glass-shadow); margin-bottom:12px; }
.chdr { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:8px; }
.chdr div { text-align:center; font-size:11px; font-weight:800; padding:5px 0; }
.cgrid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cc { min-height:72px; border-radius:12px; padding:6px 4px; cursor:pointer; border:1.5px solid transparent; transition:.2s; background: var(--surface); }
.cc:hover { transform: scale(1.03); }
.cc:active { transform:scale(.95); }
.cc.sel { border:2px solid var(--accent)!important; background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(139,92,246,.15))!important; }
.cc.td { border:2px solid var(--text-primary); }
.cd { font-size:12px; font-weight:700; text-align:center; margin-bottom:3px; }
.cs { font-size:9px; font-weight:700; text-align:center; line-height:1.3; }
.cst { font-size:7px; font-weight:500; opacity:.8; margin-top:1px; }
.ctc { width:6px; height:6px; border-radius:50%; background:#10B981; margin:2px auto 0; box-shadow: 0 0 6px rgba(16,185,129,.5); }

function ensureData(d) {
  if (!d.shifts) d.shifts = {};
  if (!d.statuses) d.statuses = {};
  if (!d.actuals) d.actuals = {};
  if (!d.timeclock) d.timeclock = { records: [], active: {} };
  if (!d.timeclock.records) d.timeclock.records = [];
  if (!d.timeclock.active) d.timeclock.active = {};
  if (!d.staffList) d.staffList = [];

  if (!d.swapRequests) d.swapRequests = [];
  if (!d.notes) d.notes = {};
  if (!d.dismissedNotifs) d.dismissedNotifs = [];
  return d;
}

function loadLocalData() {
  try {
    let d = JSON.parse(localStorage.getItem(LS_KEY));
    if (!d) {
      const old = JSON.parse(localStorage.getItem('staffsystem-data'));
      if (old) d = old;
    }
    if (d) return ensureData(d);
  } catch {}
  return ensureData({});
}

function saveLocal() { localStorage.setItem(LS_KEY, JSON.stringify(cloudData)); }
function useCloud() { return API_KEY && API_KEY.length > 10; }

async function initBin() {
  if (!useCloud()) return false;
  if (BIN_ID) return true;
  try {
    const r = await fetch('https://api.jsonbin.io/v3/c/uncategorized/bins', { headers: {'X-Master-Key': API_KEY} });
    if (r.ok) {
      const j = await r.json();
      if (Array.isArray(j)) {
        const b = j.find(x => x.snippetMeta?.name === 'staff-system-v2');
        if (b) { BIN_ID = b.record; localStorage.setItem('sys-bin-id-v9', BIN_ID); return true; }
      }
    }
  } catch {}
  try {
    const r = await fetch(BIN_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Name':'staff-system-v2','X-Bin-Private':'true'},
      body: JSON.stringify(cloudData)
    });
    const j = await r.json();
    if (j.metadata?.id) { BIN_ID = j.metadata.id; localStorage.setItem('sys-bin-id-v9', BIN_ID); return true; }
  } catch {}
  return false;
}

async function fetchCloud() {
  if (!useCloud() || !BIN_ID) { setSyncStatus('local'); return false; }
  setSyncStatus('syncing');
  try {
    const r = await fetch(`${BIN_URL}/${BIN_ID}/latest`, { headers: {'X-Master-Key': API_KEY} });
    const j = await r.json();
    if (j.record) {
      cloudData = ensureData(j.record);
      saveLocal();
    }
    setSyncStatus('ok');
    return true;
  } catch (e) {
    setSyncStatus('err');
    return false;
  }
}

async function saveCloud() {
  saveLocal();
  if (!useCloud() || !BIN_ID) { setSyncStatus('local'); return; }
  if (isSaving) { saveQueue = true; return; }
  isSaving = true;
  setSyncStatus('syncing');
  try {
    const r = await fetch(`${BIN_URL}/${BIN_ID}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json','X-Master-Key':API_KEY},
      body: JSON.stringify(cloudData)
    });
    if (r.ok) setSyncStatus('ok'); else setSyncStatus('err');
  } catch { setSyncStatus('err'); }
  isSaving = false;
  if (saveQueue) { saveQueue = false; saveCloud(); }
}

function setSyncStatus(s) {

}

function pad(n) { return String(n).padStart(2,'0'); }
function cH(s,e) { if(!s||!e)return 0; const[a,b]=s.split(':').map(Number),[c,d]=e.split(':').map(Number); const x=a*60+b,y=c*60+d; let t=Math.max(0,(y-x)/60); if(x<840&&y>900)t-=1; return t; }
function gD(en) { if(!en)return null; if(en.type==='custom')return{label:'カスタム',time:`${en.start}〜${en.end}`,start:en.start,end:en.end,color:'#F59E0B',bg:'rgba(245,158,11,.15)',hours:cH(en.start,en.end)}; const p=PR.find(x=>x.id===en.type); return p?{...p}:null; }
function toDateStr(d) { return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function toTimeStr(d) { return`${pad(d.getHours())}:${pad(d.getMinutes())}`; }

function fmtH(h) { if(h==null)return'—'; return`${Math.floor(h)}h${pad(Math.floor((h-Math.floor(h))*60))}m`; }
function fmtYen(n) { return '¥' + Math.round(n).toLocaleString('ja-JP'); }

function calcWage(name, yr, mo) {
  const settings = cloudData.staffSettings[name] || { hourlyRate: 1100, nightRate: 0 };
  const rate = settings.hourlyRate || 1100;
  const nightRate = settings.nightRate || 0;
  const monthPrefix = `${yr}-${pad(mo+1)}`;
  let totalH = 0, nightH = 0, amount = 0;
  cloudData.timeclock.records.forEach(r => {
    if (r.name !== name) return;
    if (!r.date.startsWith(monthPrefix)) return;
    totalH += r.hours || 0;
    if (r.inTime && r.outTime) nightH += calcNightHours(r.inTime, r.outTime);
  });
  const dayH = totalH - nightH;
  amount = dayH * rate + nightH * (nightRate || rate);
  return { totalH, nightH, dayH, amount, rate, nightRate };
}

function calcNightHours(inTime, outTime) {
  const s = new Date(inTime), e = new Date(outTime);
  let night = 0;
  const cur = new Date(s);
  while (cur < e) {
    const h = cur.getHours();
    if (h >= 22 || h < 5) night += 1/60;
    cur.setMinutes(cur.getMinutes() + 1);
  }
  return night;
}

    const elEl=Q('#elapsedTime');
    if(elEl && currentUser){
      const tc=cloudData.timeclock;
      const active=tc.active[currentUser.name];
      if(active){
        const elapsed=diffHours(active.inTime, n.toISOString());
        elEl.textContent=fmtH(elapsed);

    }
  },1000);
}

  const todayStr = toDateStr(today);
  const currentMonth = `${today.getFullYear()}-${pad(today.getMonth()+1)}`;
  const dismissed = cloudData.dismissedNotifs || [];
  if (currentUser.role === 'staff') {
    const todayShift = cloudData.shifts[`${currentMonth}_${currentUser.name.replace(/\s/g,'_')}`];
    if (todayShift && todayShift.shifts) {
      const thisShift = todayShift.shifts[`${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`];
      if (thisShift) {
        const hasRec = cloudData.timeclock.records.some(r => r.name === currentUser.name && r.date === todayStr);
        const isActive = !!cloudData.timeclock.active[currentUser.name];
        const d = gD(thisShift);
        if (!hasRec && !isActive && d) {
          const [sh, sm] = d.start.split(':').map(Number);
          const shiftStart = new Date(today); shiftStart.setHours(sh, sm, 0, 0);
          if (today >= shiftStart) {
            const id = 'nopunch_' + todayStr;
            if (!dismissed.includes(id)) {
              notifs.push({ id, icon:'⚠️', bg:'var(--warning-bg)', color:'#B45309',
                title: 'まだ打刻していません', sub: `本日のシフト ${d.time} が始まっています` });
            }
          }
        }
      }
    }
    const next = new Date(today); next.setMonth(next.getMonth()+1);
    const nextMonth = `${next.getFullYear()}-${pad(next.getMonth()+1)}`;
    const nextKey = `${nextMonth}_${currentUser.name.replace(/\s/g,'_')}`;
    const daysUntilEnd = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate() - today.getDate();
    if (!cloudData.shifts[nextKey] && daysUntilEnd <= 7) {
      const id = 'noshift_' + nextMonth;
      if (!dismissed.includes(id)) {
        notifs.push({ id, icon:'📝', bg:'var(--info-bg)', color:'#1E40AF',
          title: `${next.getMonth()+1}月のシフトがまだ未提出です`, sub: `あと${daysUntilEnd}日で月末です` });
      }
    }
    (cloudData.swapRequests || []).forEach(r => {
      if (r.to === currentUser.name && r.status === 'pending') {
        const id = 'swap_' + r.id;
        if (!dismissed.includes(id)) {
          notifs.push({ id, icon:'🔄', bg:'var(--info-bg)', color:'#1E40AF',
            title: `${r.from}さんからシフト交換申請`, sub: `${r.date} のシフト` });
        }
      }
    });
  } else {
    const pendingCount = subs.filter(s => gS(s.name) === 'pending').length;
    if (pendingCount > 0) {
      notifs.push({ id:'pending_'+mkey(), icon:'⏳', bg:'var(--warning-bg)', color:'#B45309',
        title: `未承認シフトが${pendingCount}件`, sub: '承認待ちのシフトがあります' });
    }
    const activeCount = Object.keys(cloudData.timeclock.active || {}).length;
    if (activeCount > 0) {
      notifs.push({ id:'active_now', icon:'🟢', bg:'var(--success-bg)', color:'#059669',
        title: `現在${activeCount}名が出勤中`, sub: Object.keys(cloudData.timeclock.active).join('、') });
    }
    const swapPending = (cloudData.swapRequests || []).filter(r => r.status === 'pending').length;
    if (swapPending > 0) {
      notifs.push({ id:'swap_admin', icon:'🔄', bg:'var(--info-bg)', color:'#1E40AF',
        title: `${swapPending}件のシフト交換申請`, sub: '承認または却下してください' });
    }
    cloudData.timeclock.records.forEach(r => {
      if (r.date !== todayStr) return;
      if ((r.hours || 0) > 8) {
        const id = 'long_' + r.name + '_' + r.date;
        if (!dismissed.includes(id)) {
          notifs.push({ id, icon:'⚠️', bg:'var(--warning-bg)', color:'#B45309',
            title: `${r.name}さん 長時間勤務`, sub: `${fmtH(r.hours)} の勤務` });
        }
      }
    });
  }
  return notifs;
}

function checkNotifications() {
  const notifs = getNotifications();
  const badge = Q('#notifBadge');
  if (!badge) return;
  if (notifs.length > 0) {
    badge.style.display = 'flex';
    badge.textContent = notifs.length;
  } else {
    badge.style.display = 'none';
  }
  renderNotifList();
}

function renderNotifList() {
  const list = Q('#notifList');
  if (!list) return;
  const notifs = getNotifications();
  if (notifs.length === 0) {
    list.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text-tertiary);font-size:13px">通知はありません</div>';
    return;
  }
  list.innerHTML = notifs.map(n => `
    <div class="notif-item">
      <div class="notif-icon" style="background:${n.bg};color:${n.color}">${n.icon}</div>
      <div class="notif-content">
        <div class="notif-title">${n.title}</div>
        <div class="notif-sub">${n.sub}</div>
      </div>
      <button onclick="dismissNotif('${n.id}')" style="border:none;background:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px">✕</button>
    </div>`).join('');
}

function dismissNotif(id) {
  if (!cloudData.dismissedNotifs) cloudData.dismissedNotifs = [];
  cloudData.dismissedNotifs.push(id);
  saveCloud();
  checkNotifications();
}

function toggleNotif() {
  const panel = Q('#notifPanel');
  if (!panel) return;
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) renderNotifList();
}

document.addEventListener('click', e => {
  const panel = Q('#notifPanel');
  const btn = Q('#notifBtn');
  if (!panel || !btn) return;
  if (!panel.classList.contains('show')) return;
  if (panel.contains(e.target) || btn.contains(e.target)) return;
  panel.classList.remove('show');
});

  let statusHtml = '';
  if (isIn) {
    const elapsed = diffHours(tc.active[name].inTime, new Date().toISOString());

    statusHtml = `<div class="status-bar"><div class="status-dot"></div><span>出勤中</span><span style="margin-left:8px;font-size:12px;opacity:.85">${toTimeStr(inD)} 出勤 ／ 経過 <span id="elapsedTime">${fmtH(elapsed)}</span></span></div>`;

  </div>`;
  Q('#t-punch').innerHTML = `
    <div class="clock-hero">
      <div style="font-size:13px;color:var(--text-tertiary);margin-bottom:10px;font-weight:700">${name} さん</div>

      <div class="stamp-row">
        <button class="stamp-btn stamp-in" onclick="doStamp('in')" ${isIn?'disabled':''}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg>
          出勤
        </button>
        <button class="stamp-btn stamp-out" onclick="doStamp('out')" ${!isIn?'disabled':''}>
          退勤
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </button>
      </div>
    </div>
    ${shiftBadge}${statusHtml}${wageHtml}`;
  const n=new Date();
  const cl=Q('#liveClock'); if(cl) cl.textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  const dl=Q('#liveDate'); if(dl) dl.textContent=`${n.getFullYear()}年${pad(n.getMonth()+1)}月${pad(n.getDate())}日（${DJ[n.getDay()]}）`;
}

async function doStamp(type) {
  const name = currentUser.name;
  const now = new Date();
  const timeStr = now.toISOString();
  const dateStr = toDateStr(now);
  await fetchCloud();
  const tc2 = cloudData.timeclock;
  if (type==='in') {
    if (tc2.active[name]) { toast('⚠️ すでに出勤中です','err'); return; }
    cloudData.timeclock.active[name] = { inTime: timeStr, date: dateStr };
    toast(`✅ おはようございます、${name} さん！`);
  } else {
    if (!tc2.active[name]) { toast('⚠️ 出勤記録がありません','err'); return; }
    const hours = diffHours(tc2.active[name].inTime, timeStr);
    cloudData.timeclock.records.push({ name, date: dateStr, inTime: tc2.active[name].inTime, outTime: timeStr, hours });
    delete cloudData.timeclock.active[name];
    toast(`👋 お疲れ様でした！（${fmtH(hours)}）`);
  }
  saveCloud();
  renderPunch();
  checkNotifications();
}

function shPm(){if(M===0){Y--;M=11;}else M--;selDay=null;cpk();loadStaffShiftFromCloud();renderShift();}
function shNm(){if(M===11){Y++;M=0;}else M++;selDay=null;cpk();loadStaffShiftFromCloud();renderShift();}

function renderShift() {
  if (!Q('#ml')) return;
  Q('#ml').textContent=fD();
  Q('#subb')?.classList.toggle('show',isSub);
  if(Q('#sbtn')){Q('#sbtn').disabled=isSub;Q('#sbtn').textContent=isSub?'✓ 提出済み':'シフトを提出する';}
  rShiftCal(); rShiftStats();
}

function rShiftCal() {
  const g=Q('#cg'); if(!g)return; g.innerHTML='';
  const ds=dim(), f=dow(1);
  const todayD=now0.getDate(), todayM=now0.getMonth(), todayY=now0.getFullYear();
  for(let i=0;i<f;i++){const d=document.createElement('div');d.style.minHeight='72px';g.appendChild(d);}
  for(let d=1;d<=ds;d++){
    const w=dow(d),en=shifts[`${mk()}-${d}`],di=gD(en);
    const td=(d===todayD&&M===todayM&&Y===todayY),sl=selDay===d;
    const c=document.createElement('div');
    c.className='cc'+(sl?' sel':'')+(td?' td':'');
    if(di&&!sl){c.style.background=di.bg;if(!td)c.style.borderColor=di.color+'55';}
    c.onclick=()=>{if(!isSub){selDay=selDay===d?null:d;if(selDay)opk();else cpk();renderShift();}};
    const dd=document.createElement('div');dd.className='cd';dd.style.color=w===0?'#DC2626':w===6?'#2563EB':'var(--text-secondary)';dd.textContent=d;c.appendChild(dd);
    if(di){const s=document.createElement('div');s.className='cs';s.style.color=di.color;s.textContent=di.label;if(di.time){const t=document.createElement('div');t.className='cst';t.style.color=di.color;t.textContent=di.time;s.appendChild(t);}c.appendChild(s);}
    const dateKey=`${Y}-${pad(M+1)}-${pad(d)}`;

    if(hasRecord){const dot=document.createElement('div');dot.className='ctc';c.appendChild(dot);}
    g.appendChild(c);

function rShiftStats() {
  const ek=Object.keys(shifts).filter(k=>k.startsWith(mk()+'-'));

  if(Q('#th'))Q('#th').textContent=Math.round(ek.reduce((s,k)=>(gD(shifts[k])?.hours||0)+s,0)*10)/10+'h';

function opk() {
  const pk=Q('#pk'); if(!pk)return; pk.classList.add('show');

  if(Q('#cend'))Q('#cend').value=cur?.type==='custom'?cur.end:'21:00';

function cpk(){const pk=Q('#pk');if(pk)pk.classList.remove('show');}
function setCust(){const s=Q('#cstart')?.value,e=Q('#cend')?.value;if(!s||!e)return;shifts[`${mk()}-${selDay}`]={type:'custom',start:s,end:e};renderShift();opk();}
function clrDay(){delete shifts[`${mk()}-${selDay}`];renderShift();opk();}
function doReset(){shifts={};isSub=false;selDay=null;cpk();if(Q('#note'))Q('#note').value='';renderShift();toast('リセットしました','inf');}

function handleSub() {
  const ek=Object.keys(shifts).filter(k=>k.startsWith(mk()+'-'));
  if(!ek.length){toast('シフトを1日以上入力してください','err');return;}
  const wc=ek.length,th=Math.round(ek.reduce((s,k)=>(gD(shifts[k])?.hours||0)+s,0)*10)/10;
  Q('#cmodbody').innerHTML=`${fD()}<br>出勤日数: <strong>${wc}日</strong><br>合計時間: <strong>${th}時間</strong>`;
  Q('#cmod').classList.add('show');
}

async function doSubmit() {
  Q('#cmod').classList.remove('show');
  const name = currentUser.name;
  const ek=Object.keys(shifts).filter(k=>k.startsWith(mk()+'-'));
  const wc=ek.length,th=Math.round(ek.reduce((s,k)=>(gD(shifts[k])?.hours||0)+s,0)*10)/10;
  const key = `${mkey()}_${name.replace(/\s/g,'_')}`;
  cloudData.shifts[key] = { name, month:mkey(), shifts:{...shifts}, note:Q('#note')?.value||'', submittedAt:new Date().toISOString(), workCount:wc, totalHours:th };
  await saveCloud();
  isSub=true; renderShift(); toast('シフトを提出しました！');
}

function openSwapForm() {
  const names = (cloudData.staffList || []).filter(n => n !== currentUser.name);
  if (!names.length) { toast('交換先のスタッフがいません', 'err'); return; }
  const myShifts = [];
  const mySub = cloudData.shifts[`${mkey()}_${currentUser.name.replace(/\s/g,'_')}`];
  if (mySub?.shifts) {
    Object.keys(mySub.shifts).forEach(k => {
      const parts = k.split('-');
      const d = gD(mySub.shifts[k]);
      if (d) myShifts.push({ key:k, day:parts[2], time: d.time || d.label });
    });
  }
  if (!myShifts.length) { toast('交換できるシフトがありません', 'err'); return; }

  Q('#gmodt').textContent = 'シフト交換申請';
  Q('#gmodb').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px;text-align:left">
      <div><label style="font-size:11px;font-weight:700;color:var(--text-tertiary);display:block;margin-bottom:4px">交換したい自分のシフト</label>
        <select id="swapMyShift" class="fi">${myShifts.map(s => `<option value="${s.key}">${s.day}日 (${s.time})</option>`).join('')}</select></div>
      <div><label style="font-size:11px;font-weight:700;color:var(--text-tertiary);display:block;margin-bottom:4px">交換相手</label>
        <select id="swapTarget" class="fi">${names.map(n => `<option value="${n}">${n}</option>`).join('')}</select></div>
      <div><label style="font-size:11px;font-weight:700;color:var(--text-tertiary);display:block;margin-bottom:4px">理由（任意）</label>
        <textarea id="swapReason" class="nin" rows="2" placeholder="例）当日どうしても外せない用事ができまして..."></textarea></div>
    </div>`;
  const ok = Q('#gmodok');
  ok.textContent = '申請する';
  ok.onclick = async () => {
    const myKey = Q('#swapMyShift').value;
    const target = Q('#swapTarget').value;
    const reason = Q('#swapReason').value;
    if (!myKey || !target) return;
    const parts = myKey.split('-');
    const dateStr = `${parts[0]}/${parseInt(parts[1])+1}/${parts[2]}`;
    const fromShift = gD(mySub.shifts[myKey]);
    const targetSub = cloudData.shifts[`${mkey()}_${target.replace(/\s/g,'_')}`];
    const toShift = targetSub?.shifts?.[myKey] ? gD(targetSub.shifts[myKey]) : null;
    if (!cloudData.swapRequests) cloudData.swapRequests = [];
    cloudData.swapRequests.push({
      id: uid(),
      from: currentUser.name,
      to: target,
      date: dateStr,
      fromShift: fromShift ? (fromShift.time || fromShift.label) : '',
      toShift: toShift ? (toShift.time || toShift.label) : '休み',
      reason,
      status: 'pending',
      created: new Date().toISOString()
    });
    await saveCloud();
    Q('#gmod').classList.remove('show');
    toast('✅ 交換申請を送信しました');
    renderSwap();
    checkNotifications();
  };
  Q('#gmod').classList.add('show');
}

async function respondSwap(id, status) {
  const r = cloudData.swapRequests.find(x => x.id === id);
  if (!r) return;
  r.status = status;
  r.respondedAt = new Date().toISOString();
  // 承認時は実際のシフトを入れ替え
  if (status === 'approved') {
    const dateParts = r.date.split('/');
    const yr = parseInt(dateParts[0]);
    const mo = parseInt(dateParts[1]) - 1;
    const dy = parseInt(dateParts[2]);
    const shiftKey = `${yr}-${mo}-${dy}`;
    const fromSubKey = `${yr}-${pad(mo+1)}_${r.from.replace(/\s/g,'_')}`;
    const toSubKey = `${yr}-${pad(mo+1)}_${r.to.replace(/\s/g,'_')}`;
    const fromSub = cloudData.shifts[fromSubKey];
    const toSub = cloudData.shifts[toSubKey];
    if (fromSub) {
      if (!fromSub.shifts) fromSub.shifts = {};
      const fromS = fromSub.shifts[shiftKey];
      const toS = toSub?.shifts?.[shiftKey];
      if (toS) fromSub.shifts[shiftKey] = toS; else delete fromSub.shifts[shiftKey];
      if (toSub) {
        if (!toSub.shifts) toSub.shifts = {};
        if (fromS) toSub.shifts[shiftKey] = fromS; else delete toSub.shifts[shiftKey];
      }
    }
  }
  await saveCloud();
  toast(status === 'approved' ? '✅ 交換を承認しました' : '交換を却下しました', status === 'approved' ? 'ok' : 'inf');
  renderSwap();
  checkNotifications();
}

async function cancelSwap(id) {
  const ok = await confirmDialog('交換申請を取り消しますか？', 'この操作は元に戻せません。', '取り消す', true);
  if (!ok) return;
  cloudData.swapRequests = cloudData.swapRequests.filter(r => r.id !== id);
  await saveCloud();
  toast('🗑 申請を取り消しました', 'inf');
  renderSwap();
}

function filterOverview() {
  const q = (Q('#overviewSearch')?.value || '').toLowerCase();
  const f = Q('#overviewFilter')?.value || 'all';
  QA('.overview-item').forEach(el => {
    const name = el.dataset.name.toLowerCase();
    const status = el.dataset.status;
    const active = el.dataset.active === 'true';
    let show = true;
    if (q && !name.includes(q)) show = false;
    if (f === 'pending' && status !== 'pending') show = false;
    if (f === 'approved' && status !== 'approved') show = false;
    if (f === 'active' && !active) show = false;
    el.style.display = show ? '' : 'none';
  });
}

  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">${[{l:'出勤日数',v:(s.workCount||0)+'日',c:'#6366F1'},{l:'合計時間',v:(s.totalHours||0)+'h',c:'#059669'}].map(x=>`<div style="background:var(--surface);border-radius:12px;padding:12px 18px;text-align:center;border:1px solid var(--border)"><div style="font-size:22px;font-weight:900;color:${x.c}">${x.v}</div><div style="font-size:11px;color:var(--text-tertiary);font-weight:700">${x.l}</div></div>`).join('')}</div>`;
  if(s.note)h+=`<div class="nb"style="border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px">💬 ${s.note}</div>`;
  h+='<div class="dl">';
  for(let d=1;d<=ds;d++){
    const w=dow(d),en=s.shifts?.[`${mk()}-${d}`],di=gD(en);
    const dateKey=`${Y}-${pad(M+1)}-${pad(d)}`;
    const tcRec=cloudData.timeclock.records.find(r=>r.name===s.name&&r.date===dateKey);
    const tcTag=tcRec?`<span style="background:var(--success-bg);color:#059669;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800;margin-left:4px">実${toTimeStr(new Date(tcRec.inTime))}〜${toTimeStr(new Date(tcRec.outTime))}</span>`:'';
    h+=`<div class="dlr${w===0||w===6?' we':''}"><div style="display:flex;align-items:center;gap:8px"><div class="dn" style="background:${w===0?'rgba(220,38,38,.15)':w===6?'rgba(37,99,235,.15)':'var(--surface)'};color:${w===0?'#DC2626':w===6?'#2563EB':'var(--text-secondary)'}">${d}</div><span class="dw" style="color:${w===0?'#DC2626':w===6?'#2563EB':'var(--text-tertiary)'}">${DJ[w]}</span></div><div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">${di?`<div class="st2" style="background:${di.bg};color:${di.color}">${di.label} ${di.time}</div>`:'<div style="font-size:11px;color:var(--text-muted)">—</div>'}${tcTag}</div></div>`;
  }
  h+=`</div></div><div class="br" style="margin-top:14px">`;
  if(st!=='approved')h+=`<button class="btn bapp blg" onclick="updSt('${s.name}','approved')">✓ 承認する</button>`;
  if(st==='approved')h+=`<button class="btn bpen blg" onclick="updSt('${s.name}','pending')">承認取消</button>`;
  h+='</div>';
  el.innerHTML=h;
}

function rAct() {
  const el = Q('#t-actual'); if (!el) return;
  const ds = dim(), names = allNames();
  let monthTotalActH = 0, monthTotalPlanH = 0;
  for (let d = 1; d <= ds; d++) {
    names.forEach(name => {
      const a = cloudData.actuals[`${mkey()}_${name}_${d}`];
      if (a && a.status !== 'absent' && a.start && a.end) monthTotalActH += cH(a.start, a.end);
      const en = subs.find(s=>s.name===name)?.shifts?.[`${mk()}-${d}`];
      const di = gD(en); if (di) monthTotalPlanH += di.hours;
    });
  }
  let dayTotalActH = 0, dayTotalPlanH = 0;
  const dateKey0 = `${Y}-${pad(M+1)}-${pad(selActDay)}`;
  const tcRecsDay = cloudData.timeclock.records.filter(r => r.date === dateKey0);
  const dayTcH = tcRecsDay.reduce((s,r)=>s+(r.hours||0), 0);
  names.forEach(name => {
    const a = cloudData.actuals[`${mkey()}_${name}_${selActDay}`];
    if (a && a.status !== 'absent' && a.start && a.end) dayTotalActH += cH(a.start, a.end);
    const en = subs.find(s=>s.name===name)?.shifts?.[`${mk()}-${selActDay}`];
    const di = gD(en); if (di) dayTotalPlanH += di.hours;
  });

  let h = monthNavHtml() + `<div style="font-size:16px;font-weight:800;color:var(--text-primary);margin-bottom:12px">⏱ 実働管理</div>`;
  h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
    <div class="card" style="padding:14px 18px;text-align:center;margin-bottom:0;background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.3)">
      <div style="font-size:11px;font-weight:800;color:#6366F1;margin-bottom:2px">📅 月合計・予定時間</div>
      <div style="font-size:24px;font-weight:900;color:#6366F1">${Math.round(monthTotalPlanH*10)/10}<span style="font-size:13px">h</span></div>
    </div>
    <div class="card" style="padding:14px 18px;text-align:center;margin-bottom:0;background:var(--success-bg);border-color:rgba(5,150,105,.3)">
      <div style="font-size:11px;font-weight:800;color:#059669;margin-bottom:2px">✅ 月合計・実働時間</div>
      <div style="font-size:24px;font-weight:900;color:#059669">${Math.round(monthTotalActH*10)/10}<span style="font-size:13px">h</span></div>
    </div>
  </div>`;
  h += `<select onchange="selActDay=parseInt(this.value);rAct()" style="width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid var(--border);font-size:14px;font-weight:800;background:var(--glass-bg);color:var(--text-primary);outline:none;cursor:pointer;margin-bottom:10px">`;
  for (let d = 1; d <= ds; d++) { const dw = dow(d); h += `<option value="${d}"${d === selActDay ? ' selected' : ''}>${M+1}/${d}（${DJ[dw]}）</option>`; }
  h += `</select>`;
  h += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
    <div style="background:var(--surface);border-radius:12px;padding:10px;text-align:center;border:1.5px solid var(--border)">
      <div style="font-size:10px;font-weight:800;color:var(--text-tertiary);margin-bottom:2px">予定合計</div>
      <div style="font-size:20px;font-weight:900;color:#6366F1">${Math.round(dayTotalPlanH*10)/10}<span style="font-size:11px">h</span></div>
    </div>
    <div style="background:var(--surface);border-radius:12px;padding:10px;text-align:center;border:1.5px solid var(--border)">
      <div style="font-size:10px;font-weight:800;color:var(--text-tertiary);margin-bottom:2px">実働合計</div>
      <div style="font-size:20px;font-weight:900;color:#059669">${Math.round(dayTotalActH*10)/10}<span style="font-size:11px">h</span></div>
    </div>
    <div style="background:var(--success-bg);border-radius:12px;padding:10px;text-align:center;border:1.5px solid rgba(16,185,129,.35)">
      <div style="font-size:10px;font-weight:800;color:#059669;margin-bottom:2px">打刻合計</div>
      <div style="font-size:20px;font-weight:900;color:#059669">${Math.round(dayTcH*10)/10}<span style="font-size:11px">h</span></div>
    </div>
  </div>`;
  el.innerHTML = h;
  renderActDay(selActDay);
}

function renderActDay(day) {
  const el = Q('#t-actual'); if (!el) return;
  const names = allNames();
  const existing = el.querySelector('.act-day-body');
  if (existing) existing.remove();
  const wrap = document.createElement('div');
  wrap.className = 'act-day-body';
  const dateKey = `${Y}-${pad(M+1)}-${pad(day)}`;
  const tcRecs = cloudData.timeclock.records.filter(r => r.date === dateKey);
  const planned = gDaySum(day);
  const plannedNames = planned.map(p => p.name);
  const actKey = (n, d) => `${mkey()}_${n}_${d}`;

  if (tcRecs.length) {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:var(--success-bg);border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:12px;color:#059669;font-weight:800;border:1px solid rgba(5,150,105,.25)';
    banner.textContent = '🟢 打刻記録: ' + tcRecs.map(r => `${r.name} ${toTimeStr(new Date(r.inTime))}〜${toTimeStr(new Date(r.outTime))}`).join(' / ');
    wrap.appendChild(banner);
  }

  if (planned.length) {
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:12px;font-weight:800;color:var(--text-secondary);margin-bottom:8px';
    lbl.textContent = '📋 シフト予定あり';
    wrap.appendChild(lbl);
    planned.forEach(p => {
      const ak = actKey(p.name, day);
      const a = cloudData.actuals[ak];
      const tcR = tcRecs.find(r => r.name === p.name);
      const card = document.createElement('div');
      card.className = 'acard';
      if (tcR) {
        const hint = document.createElement('div');
        hint.style.cssText = 'font-size:11px;color:#059669;margin-bottom:8px;font-weight:700';
        hint.textContent = `📍 打刻: ${toTimeStr(new Date(tcR.inTime))}〜${toTimeStr(new Date(tcR.outTime))} (${fmtH(tcR.hours)})`;
        card.appendChild(hint);
      }
      const topRow = document.createElement('div');
      topRow.className = 'arow'; topRow.style.marginBottom = '10px';
      topRow.innerHTML = `<div class="aname">${p.name}</div><div style="font-size:10px;color:var(--text-tertiary);background:var(--surface);padding:3px 9px;border-radius:5px;border:1px solid var(--border)">予定: ${p.time}</div>`;
      card.appendChild(topRow);
      if (!a) {
        const btns = document.createElement('div');
        btns.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap';
        const btnStyles = [
          { status:'normal', label:'✅ 予定通り', bg:'rgba(5,150,105,.12)', color:'#059669', border:'rgba(5,150,105,.35)' },
          { status:'change', label:'⏱ 時間変更',  bg:'rgba(124,58,237,.12)', color:'#7C3AED', border:'rgba(124,58,237,.35)' },
          { status:'late',   label:'⏰ 遅刻',     bg:'rgba(245,158,11,.12)', color:'#B45309', border:'rgba(245,158,11,.35)' },
          { status:'early',  label:'🏃 早退',     bg:'rgba(245,158,11,.12)', color:'#B45309', border:'rgba(245,158,11,.35)' },
          { status:'absent', label:'❌ 休み',     bg:'rgba(220,38,38,.12)', color:'#DC2626', border:'rgba(220,38,38,.35)' },
        ];
        btnStyles.forEach(bs => {
          const btn = document.createElement('button');
          btn.textContent = bs.label;
          btn.style.cssText = `padding:9px 14px;border-radius:11px;border:1.5px solid ${bs.border};background:${bs.bg};color:${bs.color};font-size:12px;font-weight:800;cursor:pointer;transition:.2s`;
          btn.addEventListener('click', () => applyActStatus(p, day, bs.status, tcR));
          btns.appendChild(btn);
        });
        card.appendChild(btns);
      } else {
        const statusLabels = { normal:'✅ 予定通り', change:'⏱ 時間変更', late:'⏰ 遅刻', early:'🏃 早退', absent:'❌ 休み', added:'➕ 追加' };
        const statusColors = { normal:'#059669', change:'#7C3AED', late:'#B45309', early:'#B45309', absent:'#DC2626', added:'#7C3AED' };
        const statusBgs    = { normal:'rgba(5,150,105,.15)',  change:'rgba(124,58,237,.15)', late:'rgba(245,158,11,.15)', early:'rgba(245,158,11,.15)', absent:'rgba(220,38,38,.15)', added:'rgba(124,58,237,.15)' };
        const st = a.status || 'normal';
        const statRow = document.createElement('div');
        statRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap';
        statRow.innerHTML = `<span style="background:${statusBgs[st]};color:${statusColors[st]};padding:5px 14px;border-radius:9px;font-size:12px;font-weight:800">${statusLabels[st]||st}</span>`;
        if (a.start && a.end) {
          statRow.innerHTML += `<span style="font-size:13px;font-weight:800;color:var(--text-primary);font-family:'DM Mono',monospace">${a.start}〜${a.end}</span><span style="font-size:12px;color:var(--accent);font-weight:800">${cH(a.start,a.end)}h</span>`;
        }
        card.appendChild(statRow);
        if (st !== 'absent') {
          const timeRow = document.createElement('div');
          timeRow.className = 'arow'; timeRow.style.marginBottom = '6px';
          timeRow.innerHTML = `
            <select class="asel" onchange="setActField('${p.name}',${day},'start',this.value)">
              <option value="">開始修正</option>${TM.map(t=>`<option value="${t}"${a.start===t?' selected':''}>${t}</option>`).join('')}
            </select>
            <span style="font-size:12px;color:var(--text-tertiary)">〜</span>
            <select class="asel" onchange="setActField('${p.name}',${day},'end',this.value)">
              <option value="">終了修正</option>${TM.map(t=>`<option value="${t}"${a.end===t?' selected':''}>${t}</option>`).join('')}
            </select>
            <select class="astatus" onchange="setActField('${p.name}',${day},'status',this.value)">
              ${[{v:'normal',l:'予定通り'},{v:'change',l:'時間変更'},{v:'late',l:'遅刻'},{v:'early',l:'早退'}].map(o=>`<option value="${o.v}"${a.status===o.v?' selected':''}>${o.l}</option>`).join('')}
            </select>`;
          card.appendChild(timeRow);
        }
        const resetBtn = document.createElement('button');
        resetBtn.textContent = '↩ リセット';
        resetBtn.style.cssText = 'border:none;background:none;color:var(--text-tertiary);font-size:11px;font-weight:700;cursor:pointer;padding:2px 0';
        resetBtn.addEventListener('click', () => { delete cloudData.actuals[ak]; saveCloud(); renderActDay(day); });
        card.appendChild(resetBtn);
      }
      wrap.appendChild(card);
    });
  }

  const addedKeys = Object.keys(cloudData.actuals).filter(k => k.startsWith(mkey()+'_') && k.endsWith('_'+day) && cloudData.actuals[k].status === 'added');
  const addLbl = document.createElement('div');
  addLbl.style.cssText = 'font-size:12px;font-weight:800;color:#7C3AED;margin-top:16px;margin-bottom:8px';
  addLbl.textContent = '➕ 追加・予定外出勤';
  wrap.appendChild(addLbl);
  addedKeys.forEach(ak => {
    const name = ak.replace(`${mkey()}_`, '').replace('_'+day, '');
    if (plannedNames.includes(name)) return;
    const a = cloudData.actuals[ak];
    const card = document.createElement('div');
    card.className = 'acard';
    card.style.border = '1.5px solid rgba(124,58,237,.3)';
    const topRow = document.createElement('div');
    topRow.className = 'arow'; topRow.style.marginBottom = '8px';
    topRow.innerHTML = `<div class="aname">${name}</div><div style="font-size:10px;color:#7C3AED;background:rgba(124,58,237,.15);padding:3px 9px;border-radius:5px">追加</div>`;
    const delBtn = document.createElement('button');
    delBtn.textContent = '✕';
    delBtn.style.cssText = 'margin-left:auto;border:none;background:none;color:var(--danger);cursor:pointer;font-size:13px;font-weight:800';
    delBtn.addEventListener('click', () => { delete cloudData.actuals[ak]; saveCloud(); renderActDay(day); });
    topRow.appendChild(delBtn);
    card.appendChild(topRow);
    const timeRow = document.createElement('div');
    timeRow.className = 'arow';
    timeRow.innerHTML = `
      <select class="asel" onchange="setActField('${name}',${day},'start',this.value)">
        <option value="">開始</option>${TM.map(t=>`<option value="${t}"${a.start===t?' selected':''}>${t}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:var(--text-tertiary)">〜</span>
      <select class="asel" onchange="setActField('${name}',${day},'end',this.value)">
        <option value="">終了</option>${TM.map(t=>`<option value="${t}"${a.end===t?' selected':''}>${t}</option>`).join('')}
      </select>`;
    card.appendChild(timeRow);
    if (a.start && a.end) {
      const hrs = document.createElement('div');
      hrs.style.cssText = 'font-size:11px;margin-top:4px';
      hrs.innerHTML = `実働: <strong>${cH(a.start,a.end)}h</strong>`;
      card.appendChild(hrs);
    }
    wrap.appendChild(card);
  });

  const addRow = document.createElement('div');
  addRow.style.cssText = 'display:flex;gap:8px;margin-top:8px';
  const sel = document.createElement('select');
  sel.id = 'addSel';
  sel.style.cssText = 'flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;background:var(--input-bg);color:var(--text-primary);outline:none';
  sel.innerHTML = '<option value="">スタッフを選択...</option>' +
    names.filter(n => !plannedNames.includes(n) && !addedKeys.some(k => k === actKey(n, day))).map(n => `<option value="${n}">${n}</option>`).join('');
  const addBtn = document.createElement('button');
  addBtn.className = 'asave';
  addBtn.textContent = '追加';
  addBtn.addEventListener('click', () => {
    const n = sel.value; if (!n) return;
    cloudData.actuals[`${mkey()}_${n}_${day}`] = { start:'', end:'', status:'added' };
    saveCloud(); renderActDay(day);
  });
  addRow.appendChild(sel);
  addRow.appendChild(addBtn);
  wrap.appendChild(addRow);
  el.appendChild(wrap);
}

function applyActStatus(p, day, status, tcR) {
  const ak = `${mkey()}_${p.name}_${day}`;
  if (status === 'normal') {
    const start = tcR ? toTimeStr(new Date(tcR.inTime)) : p.start;
    const end   = tcR ? toTimeStr(new Date(tcR.outTime)) : p.end;
    cloudData.actuals[ak] = { start, end, status: 'normal' };
  } else if (status === 'absent') {
    cloudData.actuals[ak] = { start:'', end:'', status:'absent' };
  } else {
    const start = tcR ? toTimeStr(new Date(tcR.inTime)) : p.start;
    const end   = tcR ? toTimeStr(new Date(tcR.outTime)) : p.end;
    cloudData.actuals[ak] = { start, end, status };
  }
  saveCloud();
  renderActDay(day);
}

function setActField(n, d, f, v) {
  const k = `${mkey()}_${n}_${d}`;
  if (!cloudData.actuals[k]) cloudData.actuals[k] = { start:'', end:'', status:'normal' };
  cloudData.actuals[k][f] = v;
  saveCloud();
  renderActDay(d);
}

function rSum() {
  const el=Q('#t-summary'); if(!el)return;
  const ds=dim(),names=allNames().filter(n=>gS(n)==='approved');
  let h=monthNavHtml()+`<div style="font-size:16px;font-weight:800;color:var(--text-primary);margin-bottom:12px">📈 ${fD()} 月次集計</div><div style="font-size:11px;color:#059669;font-weight:800;background:var(--success-bg);padding:7px 14px;border-radius:10px;margin-bottom:12px;text-align:center;border:1px solid rgba(5,150,105,.25)">✓ 承認済みスタッフのみ表示</div>`;
  if(!names.length){el.innerHTML=h+'<div style="color:var(--text-tertiary);text-align:center;padding:40px">承認済みのスタッフがいません</div>';return;}

  let teamPlanT=0, teamActT=0, teamTcT=0, teamWageT=0;
  names.forEach(name=>{
    const sub2=subs.find(s=>s.name===name);
    for(let d=1;d<=ds;d++){
      const en=sub2?.shifts?.[`${mk()}-${d}`],di=gD(en);if(di)teamPlanT+=di.hours;
      const a=cloudData.actuals[`${mkey()}_${name}_${d}`];
      if(a&&a.status!=='absent'&&a.start&&a.end)teamActT+=cH(a.start,a.end);
      const dateKey=`${Y}-${pad(M+1)}-${pad(d)}`;
      const tcRec=cloudData.timeclock.records.find(r=>r.name===name&&r.date===dateKey);
      if(tcRec)teamTcT+=tcRec.hours||0;
    }
    teamWageT += calcWage(name, Y, M).amount;
  });

  h += `<div style="background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.1));border-radius:18px;padding:18px 22px;margin-bottom:16px;border:1.5px solid rgba(99,102,241,.3);backdrop-filter:blur(20px)">
    <div style="font-size:14px;font-weight:800;color:var(--accent);margin-bottom:12px">👥 チーム合計（${fD()}）</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
      <div style="text-align:center">
        <div style="font-size:22px;font-weight:900;color:#6366F1">${Math.round(teamPlanT*10)/10}<span style="font-size:12px">h</span></div>
        <div style="font-size:10px;color:#6366F1;font-weight:800;margin-top:2px">予定</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:22px;font-weight:900;color:#059669">${Math.round(teamActT*10)/10}<span style="font-size:12px">h</span></div>
        <div style="font-size:10px;color:#059669;font-weight:800;margin-top:2px">実働</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:22px;font-weight:900;color:#10B981">${Math.round(teamTcT*10)/10}<span style="font-size:12px">h</span></div>
        <div style="font-size:10px;color:#10B981;font-weight:800;margin-top:2px">打刻</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:16px;font-weight:900;color:var(--accent-2)">${fmtYen(teamWageT)}</div>
        <div style="font-size:10px;color:var(--accent-2);font-weight:800;margin-top:2px">人件費</div>
      </div>
    </div>
  </div>`;

  names.forEach(name=>{
    const sub=subs.find(s=>s.name===name);
    let planT=0,actT=0,tcT=0;
    const lateDays=[],earlyDays=[],absentDays=[],addedDays=[];
    for(let d=1;d<=ds;d++){
      const en=sub?.shifts?.[`${mk()}-${d}`],di=gD(en);if(di)planT+=di.hours;
      const a=cloudData.actuals[`${mkey()}_${name}_${d}`];
      if(a){
        if(a.status==='absent'){absentDays.push(d);}
        else if(a.start&&a.end)actT+=cH(a.start,a.end);
        if(a.status==='late')lateDays.push(d);
        if(a.status==='early')earlyDays.push(d);
        if(a.status==='added')addedDays.push(d);
      }
      const dateKey=`${Y}-${pad(M+1)}-${pad(d)}`;
      const tcRec=cloudData.timeclock.records.find(r=>r.name===name&&r.date===dateKey);
      if(tcRec)tcT+=tcRec.hours||0;
    }
    const wage = calcWage(name, Y, M);
    const late=lateDays.length,early=earlyDays.length,absent=absentDays.length,added=addedDays.length;
    h+=`<div class="sumcard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div class="av avs">${name[0]}</div><div style="font-size:15px;font-weight:800;color:var(--text-primary)">${name}</div><div style="margin-left:auto;font-size:14px;font-weight:900;color:var(--accent-2)">${fmtYen(wage.amount)}</div></div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px"><div style="background:var(--surface);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border)"><div style="font-size:17px;font-weight:900;color:#6366F1">${Math.round(planT*10)/10}h</div><div style="font-size:10px;color:var(--text-tertiary);font-weight:700">予定</div></div><div style="background:var(--surface);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border)"><div style="font-size:17px;font-weight:900;color:#059669">${Math.round(actT*10)/10}h</div><div style="font-size:10px;color:var(--text-tertiary);font-weight:700">実働</div></div><div style="background:var(--success-bg);border-radius:10px;padding:10px;text-align:center;border:1px solid rgba(5,150,105,.3)"><div style="font-size:17px;font-weight:900;color:#059669">${Math.round(tcT*10)/10}h</div><div style="font-size:10px;color:#059669;font-weight:800">打刻</div></div></div>`;
    const tags=[];
    if(late)tags.push(`<span style="background:rgba(245,158,11,.15);color:#B45309;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:800">⏰ 遅刻 ${late}回（${lateDays.map(d=>`${M+1}/${d}`).join('・')}）</span>`);
    if(early)tags.push(`<span style="background:rgba(245,158,11,.15);color:#B45309;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:800">🏃 早退 ${early}回（${earlyDays.map(d=>`${M+1}/${d}`).join('・')}）</span>`);
    if(absent)tags.push(`<span style="background:rgba(220,38,38,.15);color:#DC2626;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:800">❌ 欠勤 ${absent}回（${absentDays.map(d=>`${M+1}/${d}`).join('・')}）</span>`);
    if(added)tags.push(`<span style="background:rgba(124,58,237,.15);color:#7C3AED;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:800">➕ 追加 ${added}回（${addedDays.map(d=>`${M+1}/${d}`).join('・')}）</span>`);
    h+=tags.length?`<div style="display:flex;gap:4px;flex-wrap:wrap">${tags.join('')}</div>`:'<div style="font-size:11px;color:var(--text-tertiary)">ステータス: 問題なし</div>';
    h+='</div>';
  });
  el.innerHTML=h;
}

// ANALYTICS (ADMIN)
// =============================================
function renderAnalytics() {
  const el = Q('#t-analytics'); if (!el) return;
  const names = allNames().filter(n => gS(n) === 'approved');
  const ds = dim();

  // 1. スタッフ別勤務時間（バーチャート）
  const staffHours = names.map(name => {
    let total = 0;
    cloudData.timeclock.records.forEach(r => {
      if (r.name === name && r.date.startsWith(mkey())) total += r.hours || 0;
    });
    return { name, hours: total, wage: calcWage(name, Y, M).amount };
  }).sort((a,b) => b.hours - a.hours);

  const maxH = Math.max(...staffHours.map(s => s.hours), 1);

  // 2. 日別総勤務時間（ラインチャート用データ）
  const dailyHours = [];
  for (let d = 1; d <= ds; d++) {
    const dateKey = `${Y}-${pad(M+1)}-${pad(d)}`;
    const dayH = cloudData.timeclock.records
      .filter(r => r.date === dateKey)
      .reduce((s,r) => s + (r.hours || 0), 0);
    dailyHours.push({ d, hours: dayH });
  }
  const maxDailyH = Math.max(...dailyHours.map(x => x.hours), 1);

  // 3. シフト種類別円グラフ用データ
  const shiftCounts = {};
  PR.forEach(p => shiftCounts[p.id] = 0);
  shiftCounts.custom = 0;
  subs.forEach(s => {
    if (gS(s.name) !== 'approved') return;
    Object.values(s.shifts || {}).forEach(en => {
      if (en?.type) shiftCounts[en.type] = (shiftCounts[en.type] || 0) + 1;
    });
  });
  const totalShifts = Object.values(shiftCounts).reduce((a,b)=>a+b, 0);

  // 4. ステータス分布
  const statusCounts = { normal:0, late:0, early:0, absent:0, added:0 };
  Object.values(cloudData.actuals).forEach(a => {
    if (a.status) statusCounts[a.status] = (statusCounts[a.status] || 0) + 1;
  });

  let h = monthNavHtml() + `<div style="font-size:16px;font-weight:800;color:var(--text-primary);margin-bottom:14px">📊 データ分析</div>`;

  // チーム合計サマリー
  const totalTeamH = staffHours.reduce((s,x)=>s+x.hours, 0);
  const totalTeamWage = staffHours.reduce((s,x)=>s+x.wage, 0);
  const avgH = names.length ? totalTeamH / names.length : 0;
  h += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
    <div class="card" style="padding:14px 10px;text-align:center;margin-bottom:0"><div style="font-size:22px;font-weight:900;color:#6366F1">${names.length}</div><div style="font-size:10px;color:var(--text-tertiary);font-weight:700">スタッフ</div></div>
    <div class="card" style="padding:14px 10px;text-align:center;margin-bottom:0"><div style="font-size:22px;font-weight:900;color:#059669">${Math.round(totalTeamH)}<span style="font-size:11px">h</span></div><div style="font-size:10px;color:var(--text-tertiary);font-weight:700">総勤務</div></div>
    <div class="card" style="padding:14px 10px;text-align:center;margin-bottom:0"><div style="font-size:22px;font-weight:900;color:#10B981">${Math.round(avgH*10)/10}<span style="font-size:11px">h</span></div><div style="font-size:10px;color:var(--text-tertiary);font-weight:700">平均</div></div>
    <div class="card" style="padding:14px 10px;text-align:center;margin-bottom:0"><div style="font-size:14px;font-weight:900;color:#8B5CF6">${fmtYen(totalTeamWage)}</div><div style="font-size:10px;color:var(--text-tertiary);font-weight:700">人件費</div></div>
  </div>`;

  // スタッフ別時間ランキング
  h += `<div class="chart-wrap">
    <div class="chart-title">🏆 スタッフ別勤務時間ランキング</div>
    <div class="bar-chart">`;
  if (staffHours.length === 0) {
    h += `<div style="text-align:center;padding:20px;color:var(--text-tertiary);font-size:13px">データがありません</div>`;
  } else {
    staffHours.forEach((s, idx) => {
      const pct = maxH > 0 ? (s.hours / maxH * 100) : 0;
      const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '';
      h += `<div class="bar-row">
        <div class="bar-label">${medal} ${s.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%">${s.hours > 3 ? fmtH(s.hours) : ''}</div>
        </div>
        <div class="bar-value">${s.hours <= 3 ? fmtH(s.hours) : fmtYen(s.wage)}</div>
      </div>`;
    });
  }
  h += `</div></div>`;

  // 日別勤務時間グラフ
  h += `<div class="chart-wrap">
    <div class="chart-title">📈 日別総勤務時間</div>
    <div style="display:flex;align-items:flex-end;gap:2px;height:120px;padding:8px 0">`;
  dailyHours.forEach(x => {
    const pct = maxDailyH > 0 ? (x.hours / maxDailyH * 100) : 0;
    const w = dow(x.d);
    const color = w === 0 ? '#DC2626' : w === 6 ? '#2563EB' : '#6366F1';
    h += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px" title="${x.d}日: ${fmtH(x.hours)}">
      <div style="width:100%;height:${Math.max(pct, 2)}%;background:linear-gradient(180deg,${color},${color}99);border-radius:3px 3px 0 0;min-height:2px;transition:height .8s"></div>
      <div style="font-size:8px;color:var(--text-tertiary);font-weight:600">${x.d}</div>
    </div>`;
  });
  h += `</div></div>`;

  // シフト種類円グラフ
  if (totalShifts > 0) {
    h += `<div class="chart-wrap">
      <div class="chart-title">🍩 シフト種類の内訳</div>
      <div class="donut-wrap">
        <div class="donut">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="45" fill="none" stroke="var(--surface)" stroke-width="18"/>`;
    let offset = 0;
    const circ = 2 * Math.PI * 45;
    const shiftMap = [...PR, {id:'custom',label:'カスタム',color:'#F59E0B'}];
    shiftMap.forEach(p => {
      const cnt = shiftCounts[p.id] || 0;
      if (cnt === 0) return;
      const pct = cnt / totalShifts;
      const dash = pct * circ;
      h += `<circle cx="60" cy="60" r="45" fill="none" stroke="${p.color}" stroke-width="18" stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${-offset}" stroke-linecap="butt"/>`;
      offset += dash;
    });
    h += `</svg>
          <div class="donut-center">
            <div class="donut-value">${totalShifts}</div>
            <div class="donut-label">シフト</div>
          </div>
        </div>
        <div class="donut-legend">`;
    shiftMap.forEach(p => {
      const cnt = shiftCounts[p.id] || 0;
      if (cnt === 0) return;
      const pct = Math.round(cnt / totalShifts * 100);
      h += `<div class="donut-legend-item">
        <div class="donut-legend-dot" style="background:${p.color}"></div>
        <span><strong>${p.label}</strong>: ${cnt}件 (${pct}%)</span>
      </div>`;
    });
    h += `</div></div></div>`;
  }

  // ステータス分布
  const statTotal = Object.values(statusCounts).reduce((a,b)=>a+b, 0);
  if (statTotal > 0) {
    const statMap = [
      { k:'normal', l:'予定通り', c:'#059669' },
      { k:'change', l:'時間変更', c:'#7C3AED' },
      { k:'late', l:'遅刻', c:'#F59E0B' },
      { k:'early', l:'早退', c:'#EAB308' },
      { k:'absent', l:'欠勤', c:'#DC2626' },
      { k:'added', l:'追加', c:'#8B5CF6' },
    ];
    h += `<div class="chart-wrap">
      <div class="chart-title">📊 勤務ステータス分布</div>
      <div class="bar-chart">`;
    statMap.forEach(s => {
      const c = statusCounts[s.k] || 0;
      if (c === 0) return;
      const pct = c / statTotal * 100;
      h += `<div class="bar-row">
        <div class="bar-label" style="color:${s.c}">${s.l}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:linear-gradient(135deg,${s.c},${s.c}bb)">${c > 0 && pct > 15 ? c + '件' : ''}</div>
        </div>
        <div class="bar-value">${c}件</div>
      </div>`;
    });
    h += `</div></div>`;
  }

  el.innerHTML = h;
}

function filterHistory() {
  const nameF=(Q('#fName')?.value||'').toLowerCase();
  const dateF=Q('#fDate')?.value||'';
  const monthF=Q('#fMonth')?.value||'';
  let recs=[...cloudData.timeclock.records].reverse();
  if(nameF)recs=recs.filter(r=>r.name.toLowerCase().includes(nameF));
  if(dateF)recs=recs.filter(r=>r.date===dateF);
  if(monthF)recs=recs.filter(r=>r.date.startsWith(monthF));
  const cnt=Q('#histCount'); if(cnt)cnt.textContent=`${recs.length}件`;
  const tbody=Q('#histBody'),empty=Q('#histEmpty');
  if(!tbody)return;
  if(!recs.length){tbody.innerHTML='';if(empty)empty.style.display='block';return;}
  if(empty)empty.style.display='none';
  tbody.innerHTML=recs.map(r=>`<tr><td>${r.date}</td><td class="name-c">${r.name}</td><td>${toTimeStr(new Date(r.inTime))}</td><td>${toTimeStr(new Date(r.outTime))}</td><td class="hrs-c">${fmtH(r.hours)}</td></tr>`).join('');
}

function exportCSV() {
  const rows=[['日付','名前','出勤時刻','退勤時刻','勤務時間(h)','時給','給与概算']];
  cloudData.timeclock.records.forEach(r=>{
    const settings = cloudData.staffSettings[r.name] || { hourlyRate: 1100 };
    const wage = (r.hours||0) * (settings.hourlyRate || 1100);
    rows.push([r.date,r.name,toTimeStr(new Date(r.inTime)),toTimeStr(new Date(r.outTime)),(r.hours||0).toFixed(2),settings.hourlyRate||'',Math.round(wage)]);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`打刻記録_${toDateStr(new Date())}.csv`; a.click();
  toast('📥 CSVをダウンロードしました');
}

          <div>
            <label style="font-size:10px;color:var(--text-tertiary);font-weight:700;display:block;margin-bottom:4px">深夜時給 (22時以降, 円)</label>
            <input type="number" class="finp" style="padding:8px 12px;font-size:13px" value="${settings.nightRate || ''}" placeholder="1400"

async function updateStaffSetting(name, field, value) {
  if (!cloudData.staffSettings[name]) cloudData.staffSettings[name] = {};
  cloudData.staffSettings[name][field] = value ? parseInt(value) : null;
  await saveCloud();
  toast(`💰 ${name}の${field === 'hourlyRate' ? '時給' : '深夜時給'}を更新しました`);
}

async function removeStaffConfirm(name) {
  const ok = await confirmDialog('スタッフを削除', `<strong>${name}</strong> を削除しますか？<br>過去のシフト・打刻データは残ります。`, '削除する', true);
  if (ok) removeStaff(name);
}

async function addStaffToList() {
  const inp = Q('#newStaffInput');
  const name = inp?.value?.trim();
  if (!name) { toast('名前を入力してください','err'); return; }
  if (!cloudData.staffList) cloudData.staffList = [];
  if (cloudData.staffList.includes(name)) { toast('すでに登録されています','err'); return; }
  cloudData.staffList.push(name);
  cloudData.staffList.sort();
  await saveCloud();
  inp.value = '';
  renderStaffList();
  toast(`✅ ${name} を追加しました`);
}

async function removeStaff(name) {
  if (!cloudData.staffList) return;
  cloudData.staffList = cloudData.staffList.filter(n => n !== name);
  await saveCloud();
  renderStaffList();
  toast(`🗑 ${name} を削除しました`, 'inf');
}

function closeDayModal() { Q('#dayModal').style.display = 'none'; }

async function deleteShift(editId, name, day) {
  const sub = subs.find(s => s.name === name);
  if (!sub) return;
  const shiftKey = mk() + '-' + day;
  if (sub.shifts) delete sub.shifts[shiftKey];
  closeDayModal();
  rCalAdmin();
  toast('🗑 ' + name + ' ' + (M+1) + '/' + day + ' のシフトを削除しました');
  saveCloud();
}

function toggleAddShift(day) {
  const form = document.getElementById('addShiftForm_' + day);
  if (!form) return;
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function saveAddShift(day) {
  const nameSel  = document.getElementById('addStaffSel_' + day);
  const startSel = document.getElementById('addStart_' + day);
  const endSel   = document.getElementById('addEnd_' + day);
  if (!nameSel || !startSel || !endSel) return;
  const name     = nameSel.value;
  const newStart = startSel.value;
  const newEnd   = endSel.value;
  if (!name) { toast('スタッフを選択してください', 'err'); return; }
  if (!newStart || !newEnd) { toast('時間を選択してください', 'err'); return; }
  if (newStart >= newEnd) { toast('終了時間は開始時間より後にしてください', 'err'); return; }
  let sub = subs.find(s => s.name === name);
  if (!sub) {
    sub = { name, shifts: {}, submittedAt: new Date().toISOString() };
    subs.push(sub);
  }
  if (!sub.shifts) sub.shifts = {};
  const shiftKey = mk() + '-' + day;
  sub.shifts[shiftKey] = { type: 'custom', start: newStart, end: newEnd };
  if (!cloudData.statuses) cloudData.statuses = {};
  cloudData.statuses[mkey() + '_' + name] = 'approved';
  // Save to cloudData.shifts too
  const subKey = mkey() + '_' + name.replace(/\s/g, '_');
  cloudData.shifts[subKey] = sub;
  closeDayModal();
  rCalAdmin();
  toast('✅ ' + name + ' ' + (M+1) + '/' + day + ' にシフトを追加しました');
  saveCloud();
}

function toggleShiftEdit(editId, name, day, start, end) {
  const form = document.getElementById('editForm_' + editId);
  if (!form) return;
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function saveShiftEdit(editId, name, day) {
  const startSel = document.getElementById('editStart_' + editId);
  const endSel   = document.getElementById('editEnd_' + editId);
  if (!startSel || !endSel) return;
  const newStart = startSel.value;
  const newEnd   = endSel.value;
  if (!newStart || !newEnd) { toast('時間を選択してください', 'err'); return; }
  if (newStart >= newEnd) { toast('終了時間は開始時間より後にしてください', 'err'); return; }
  const sub = subs.find(s => s.name === name);
  if (!sub) return;
  const shiftKey = mk() + '-' + day;
  if (!sub.shifts) sub.shifts = {};
  sub.shifts[shiftKey] = { type: 'custom', start: newStart, end: newEnd };
  // Save sub back
  const subKey = mkey() + '_' + name.replace(/\s/g, '_');
  cloudData.shifts[subKey] = sub;
  const displayEl = document.getElementById('shiftDisplay_' + editId);
  if (displayEl) {
    const hours = cH(newStart, newEnd);
    displayEl.innerHTML = `${newStart}〜${newEnd} <span style="font-size:11px;background:rgba(245,158,11,.15);padding:2px 8px;border-radius:5px;color:#F59E0B;font-weight:800">修正済</span> <span style="font-size:11px;color:var(--accent);font-weight:900">${hours}h</span>`;
  }
  document.getElementById('editForm_' + editId).style.display = 'none';
  rCalAdmin();
  toast('✅ ' + name + ' のシフトを修正しました');
  saveCloud();
}

async function compressImage(file, maxWidth = 800, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = h * (maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function changeAdminPass() {
  const cur = Q('#curPass').value;
  const nw = Q('#newPass').value;
  const nw2 = Q('#newPass2').value;
  const msg = Q('#passMsg');
  const showMsg = (text, ok) => {
    msg.textContent = text;
    msg.style.color = ok ? '#059669' : 'var(--danger)';
    msg.style.display = 'block';
  };
  if (cur !== ADMIN_PASS) { showMsg('現在のパスワードが違います', false); return; }
  if (nw.length < 4) { showMsg('4文字以上で設定してください', false); return; }
  if (nw !== nw2) { showMsg('新しいパスワードが一致しません', false); return; }
  ADMIN_PASS = nw;
  localStorage.setItem('admin-pass', nw);
  Q('#curPass').value = ''; Q('#newPass').value = ''; Q('#newPass2').value = '';
  showMsg('✅ パスワードを変更しました', true);
}

function renderResetBtn() {
  const area = Q('#resetArea'); if (!area) return;
  const btn = document.createElement('button');
  btn.textContent = '全データをリセットする';
  btn.style.cssText = 'width:100%;padding:13px;border-radius:13px;border:1.5px solid rgba(220,38,38,.4);background:var(--danger-bg);color:var(--danger);font-size:14px;font-weight:800;cursor:pointer';
  btn.addEventListener('click', () => {
    const passInput = Q('#resetPass');
    if (!passInput || passInput.value !== ADMIN_PASS) {
      passInput.style.borderColor = 'var(--danger)';
      toast('パスワードが違います', 'err');
      return;
    }
    if (btn.dataset.confirm === '1') {
      resetAllData();
    } else {
      btn.dataset.confirm = '1';
      btn.textContent = '⚠️ 本当にリセット（取り消し不可）';
      btn.style.background = 'var(--danger)';
      btn.style.color = '#fff';
      btn.style.borderColor = 'var(--danger)';
      setTimeout(() => {
        if (btn.dataset.confirm === '1') {
          btn.dataset.confirm = '';
          btn.textContent = '全データをリセットする';
          btn.style.background = 'var(--danger-bg)';
          btn.style.color = 'var(--danger)';
          btn.style.borderColor = 'rgba(220,38,38,.4)';
        }
      }, 4000);
    }
  });
  area.appendChild(btn);
}

async function resetAllData() {
  cloudData.shifts = {};
  cloudData.statuses = {};
  cloudData.actuals = {};
  cloudData.timeclock = { records: [], active: {} };
  cloudData.swapRequests = [];
  cloudData.dismissedNotifs = [];
  await saveCloud();
  subs = [];
  toast('✅ データをリセットしました', 'inf');
  renderAdminSettings();
  if (Q('#resetPass')) Q('#resetPass').value = '';
}
