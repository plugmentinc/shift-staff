<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>シフト＆タイムカード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:#F0F2F8;font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',-apple-system,sans-serif;padding-bottom:60px}
button,input,select,textarea{font-family:inherit}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#1E1B4B 0%,#312E81 50%,#1a472a 100%)}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.login-brand-icon{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:24px}
.login-brand-text{color:#fff;font-size:18px;font-weight:800}
.login-brand-sub{color:rgba(255,255,255,.5);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.login-box{background:#fff;border-radius:24px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,.3)}
.login-box h2{font-size:20px;font-weight:800;color:#0F172A;margin-bottom:6px;text-align:center}
.login-box .sub{font-size:13px;color:#94A3B8;text-align:center;margin-bottom:24px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.role-card{border:2px solid #E2E8F0;border-radius:14px;padding:18px 12px;cursor:pointer;text-align:center;transition:.15s;background:#F8FAFC}
.role-card:hover{border-color:#6366F1;background:#EEF2FF;transform:translateY(-2px)}
.role-card.sel{border-color:#6366F1;background:#EEF2FF}
.role-card .ri{font-size:28px;margin-bottom:8px}
.role-card .rn{font-size:14px;font-weight:700;color:#0F172A}
.role-card .rd{font-size:11px;color:#94A3B8;margin-top:3px;line-height:1.4}
.login-fields{display:none;margin-bottom:18px}
.login-fields.show{display:block}
.fl{margin-bottom:14px}
.fl label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#94A3B8;margin-bottom:7px}
.fi{width:100%;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:10px;padding:12px 14px;font-size:15px;color:#0F172A;outline:none;transition:.15s}
.fi:focus{border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.btn-login{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-size:15px;font-weight:800;cursor:pointer;transition:.15s;box-shadow:0 4px 20px rgba(99,102,241,.3)}
.btn-login:hover{transform:translateY(-1px)}
.btn-login:disabled{background:#CBD5E1;box-shadow:none;cursor:not-allowed;transform:none}
.login-err{color:#DC2626;font-size:13px;text-align:center;margin-top:10px;display:none}

/* SHELL */
.app{display:none}.app.on{display:block}
.topbar{padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.topbar.staff-bar{background:linear-gradient(135deg,#1a472a,#2d6a4f,#38a169)}
.topbar.admin-bar{background:linear-gradient(135deg,#1E1B4B,#312E81,#4338CA)}
.tb-brand{display:flex;align-items:center;gap:8px;color:#fff;font-size:14px;font-weight:800}
.tb-brand-icon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:16px}
.tb-right{display:flex;align-items:center;gap:8px}
.user-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.15);border-radius:100px;padding:5px 12px 5px 7px}
.user-av{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
.user-name{color:#fff;font-size:12px;font-weight:700}
.btn-out{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 12px;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#86efac;margin-right:4px;display:inline-block}
.sync-dot.syncing{background:#fbbf24;animation:blink 1s infinite}
.sync-dot.err{background:#f87171}

/* TABS */
.tabs-wrap{max-width:700px;margin:0 auto;padding:10px 16px;position:sticky;top:56px;z-index:100}
.tabs-inner{background:#fff;border-radius:14px;padding:4px;display:flex;gap:3px;box-shadow:0 4px 24px rgba(0,0,0,.1);overflow-x:auto}
.tbtn{flex:none;padding:9px 14px;border-radius:10px;border:none;background:transparent;color:#94A3B8;font-weight:700;font-size:12px;cursor:pointer;transition:.2s;white-space:nowrap}
.tbtn:hover{background:#F1F5F9;color:#334155}
.tbtn.on{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff}
.tbtn.on.green{background:linear-gradient(135deg,#1a472a,#38a169)}
.wrap{max-width:700px;margin:0 auto;padding:0 16px;margin-top:12px}
.tc{display:none}.tc.on{display:block}

/* COMMON */
.card{background:#fff;border-radius:16px;padding:16px 20px;box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:12px}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#94A3B8;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #F1F5F9}
.empty-s{background:#fff;border-radius:18px;padding:48px 24px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.05)}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 28px;border-radius:12px;font-weight:700;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);display:none;white-space:nowrap}
.toast.show{display:block;animation:sd .25s ease}
.toast.ok{background:#D1FAE5;color:#065F46}
.toast.err{background:#FEE2E2;color:#991B1B}
.toast.inf{background:#DBEAFE;color:#1E40AF}
@keyframes sd{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* PUNCH */
.clock-hero{background:#fff;border-radius:20px;padding:36px 24px;text-align:center;margin-bottom:14px;box-shadow:0 4px 24px rgba(0,0,0,.06);position:relative;overflow:hidden}
.clock-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(26,71,42,.07) 0%,transparent 70%);pointer-events:none}
.live-time{font-family:'DM Mono',monospace;font-size:56px;font-weight:500;letter-spacing:-2px;color:#0F172A;line-height:1;margin-bottom:4px}
.live-date{font-size:13px;color:#94A3B8;margin-bottom:28px}
.stamp-row{display:flex;gap:12px;justify-content:center}
.stamp-btn{padding:15px 36px;border-radius:12px;font-size:15px;font-weight:800;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.15s}
.stamp-in{background:linear-gradient(135deg,#1a472a,#38a169);color:#fff;box-shadow:0 4px 16px rgba(26,71,42,.3)}
.stamp-in:hover{transform:translateY(-2px)}
.stamp-out{background:linear-gradient(135deg,#991B1B,#EF4444);color:#fff;box-shadow:0 4px 16px rgba(239,68,68,.3)}
.stamp-out:hover{transform:translateY(-2px)}
.stamp-btn:active{transform:translateY(0)!important}
.stamp-btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.status-bar{display:flex;align-items:center;gap:10px;background:rgba(26,71,42,.08);border:1.5px solid rgba(26,71,42,.15);border-radius:12px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#1a472a;font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%;background:#38a169;animation:blink 1.5s infinite}
.shift-today{background:linear-gradient(135deg,#EDE9FE,#F5F3FF);border:1.5px solid #C4B5FD;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}

/* HISTORY TABLE */
.htable{width:100%;border-collapse:collapse}
.htable thead th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#94A3B8;padding:9px 12px;background:#F8FAFC;border-bottom:1.5px solid #F1F5F9}
.htable tbody tr{border-bottom:1px solid #F1F5F9;transition:background .1s}
.htable tbody tr:hover{background:#F8FAFC}
.htable tbody td{padding:12px;font-size:13px;color:#64748B;font-family:'DM Mono',monospace}
.htable tbody td.name-c{font-family:'Noto Sans JP',sans-serif;font-weight:600;color:#0F172A;font-size:14px}
.htable tbody td.hrs-c{color:#1a472a;font-weight:600}
.my-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.msc{background:#fff;border-radius:14px;padding:16px 12px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.msv{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:#1a472a}
.msl{font-size:11px;color:#94A3B8;margin-top:4px}

/* SHIFT */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.nbtn{height:36px;border-radius:10px;border:1.5px solid #E2E8F0;background:#fff;color:#334155;font-size:14px;cursor:pointer;display:flex;align-items:center;padding:0 14px;font-weight:600}
.ml{font-size:20px;font-weight:800;color:#0F172A;text-align:center}
.subb{font-size:11px;font-weight:700;color:#059669;background:#D1FAE5;padding:2px 10px;border-radius:6px;display:none;margin-top:4px}
.subb.show{display:inline-block}
.leg{background:#fff;border-radius:14px;padding:10px 14px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.legt{font-size:11px;font-weight:700;color:#94A3B8;margin-bottom:6px;letter-spacing:1px}
.legi{display:flex;flex-wrap:wrap;gap:5px}
.legit{display:flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600}
.cal{background:#fff;border-radius:18px;padding:14px 10px;box-shadow:0 4px 24px rgba(0,0,0,.06);margin-bottom:12px}
.chdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
.chdr div{text-align:center;font-size:11px;font-weight:700;padding:4px 0}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cc{min-height:68px;border-radius:10px;padding:5px 3px;cursor:pointer;border:1.5px solid transparent;transition:.15s}
.cc:active{transform:scale(.95)}.cc.sel{border:2px solid #6366F1;background:#EEF2FF!important}.cc.td{border:2px solid #0F172A}
.cd{font-size:12px;font-weight:600;text-align:center;margin-bottom:2px}
.cs{font-size:9px;font-weight:700;text-align:center;line-height:1.3}
.cst{font-size:7px;font-weight:500;opacity:.8;margin-top:1px}
.ctc{width:6px;height:6px;border-radius:50%;background:#38a169;margin:1px auto 0}
.pk{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 4px 24px rgba(0,0,0,.06);border:2px solid #6366F1;display:none}
.pk.show{display:block}
.pkh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pkt{font-size:15px;font-weight:800;color:#0F172A}
.pkx{width:28px;height:28px;border-radius:8px;border:1px solid #E2E8F0;background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px}
.pbtn{padding:10px 6px;border-radius:10px;border:1.5px solid #E2E8F0;background:#fff;cursor:pointer;transition:.15s}
.pbtn:active{transform:scale(.97)}.pbtn.on{border-width:2px}
.cbox{background:#FFFBEB;border-radius:12px;padding:12px;border:1.5px solid #FDE68A}
.cbox.on{border:2px solid #F59E0B}
.cbt{font-size:12px;font-weight:700;color:#92400E;margin-bottom:8px}
.crow{display:flex;align-items:center;gap:8px}
.csel{flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid #FDE68A;font-size:14px;font-weight:600;background:#fff;outline:none}
.chrs{margin-top:6px;font-size:11px;color:#92400E;font-weight:600}
.clr{margin-top:8px;width:100%;padding:8px;border-radius:8px;border:1.5px solid #E2E8F0;background:#fff;color:#94A3B8;font-weight:600;font-size:12px;cursor:pointer;display:none}
.clr.show{display:block}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.sc{background:#fff;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.sv{font-size:22px;font-weight:800}.sl{font-size:11px;font-weight:600;color:#94A3B8}
.nbox{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.ntit{font-size:13px;font-weight:700;color:#334155;margin-bottom:8px}
.nin{width:100%;border:1.5px solid #E2E8F0;border-radius:10px;padding:10px 12px;font-size:13px;resize:none;outline:none;background:#F8FAFC}
.nin:focus{border-color:#6366F1}
.acts{display:flex;gap:10px}
.arst{flex:1;padding:13px;border-radius:12px;border:1.5px solid #E2E8F0;background:#fff;color:#64748B;font-weight:700;font-size:14px;cursor:pointer}
.asub{flex:2;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,.3)}
.asub:disabled{background:#CBD5E1;box-shadow:none;cursor:not-allowed}
.vl{background:#fff;border-radius:18px;padding:16px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.vr{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;border-radius:6px}
.vr+.vr{border-top:1px solid #F1F5F9}.vr.we{background:#FAFBFF}
.vd{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.vs{padding:4px 12px;border-radius:8px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.ve{font-size:12px;color:#CBD5E1;font-weight:500}
.va{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;background:#D1FAE5;color:#065F46;margin-left:6px}
.stc{background:#fff;border-radius:18px;padding:24px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.stt{font-size:18px;font-weight:800;color:#0F172A;margin-bottom:20px}
.fld{margin-bottom:14px}
.flbl{font-size:12px;font-weight:700;color:#64748B;margin-bottom:6px}
.finp{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #E2E8F0;font-size:14px;outline:none;background:#F8FAFC}
.finp:focus{border-color:#6366F1}

/* ADMIN */
.av{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#F59E0B,#F97316);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:800}
.avs{width:34px;height:34px;border-radius:10px;font-size:13px}
.avl{width:48px;height:48px;border-radius:14px;font-size:20px}
.sb{padding:4px 12px;border-radius:8px;font-size:12px;font-weight:700}
.ip{background:#F8FAFC;border-radius:8px;padding:5px 12px;font-size:12px;display:inline-block;margin-right:6px;margin-bottom:4px}
.ip span{color:#94A3B8}.ip strong{color:#0F172A}
.nb{background:#FFFBEB;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#92400E;border:1px solid #FDE68A}
.br{display:flex;gap:8px}
.btn{padding:8px;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;flex:1;border:none}
.btn:active{transform:scale(.97)}
.bdet{border:1.5px solid #E2E8F0;background:#fff;color:#6366F1}
.bapp{background:linear-gradient(135deg,#059669,#10B981);color:#fff}
.bpen{border:1.5px solid #E2E8F0;background:#fff;color:#94A3B8}
.blg{padding:12px;border-radius:12px;font-size:14px}
.bbk{margin-bottom:14px;padding:6px 16px;border-radius:8px;border:1.5px solid #E2E8F0;background:#fff;color:#6366F1;font-weight:600;font-size:13px;cursor:pointer}
.sbtn{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:14px;padding:14px 18px;border:1.5px solid #E2E8F0;cursor:pointer;width:100%;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:8px}
.cc2{background:#fff;border-radius:18px;padding:14px 10px;box-shadow:0 4px 24px rgba(0,0,0,.06);margin-bottom:14px}
.gcell{background:#F8FAFC;border-radius:10px;padding:5px 3px;min-height:72px;border:1px solid #F1F5F9}
.gd{font-size:12px;font-weight:700;text-align:center;margin-bottom:3px}
.gw{border-radius:3px;padding:1px 2px;font-size:7px;font-weight:700;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px}
.dl{border-radius:12px;overflow:hidden;border:1px solid #F1F5F9}
.dlr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px}.dlr+.dlr{border-top:1px solid #F1F5F9}.dlr.we{background:#FAFBFF}
.dn{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.dw{font-size:12px;font-weight:600}
.st2{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700}
.acard{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 2px 12px rgba(0,0,0,.04);margin-bottom:8px}
.arow{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.aname{font-size:13px;font-weight:700;color:#0F172A;min-width:80px}
.asel{padding:6px 4px;border-radius:6px;border:1.5px solid #E2E8F0;font-size:13px;font-weight:600;background:#fff;outline:none;width:80px}
.asel:focus{border-color:#6366F1}
.astatus{padding:5px 4px;border-radius:6px;border:1.5px solid #E2E8F0;font-size:11px;font-weight:600;background:#fff;outline:none}
.asave{padding:6px 14px;border-radius:8px;border:none;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-weight:700;font-size:12px;cursor:pointer}
.sumcard{background:#fff;border-radius:16px;padding:16px 20px;box-shadow:0 2px 12px rgba(0,0,0,.04);margin-bottom:10px}
.frow{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fi-sm{background:#fff;border:1.5px solid #E2E8F0;border-radius:8px;padding:8px 12px;font-size:13px;color:#0F172A;outline:none}
.fi-sm:focus{border-color:#6366F1}
.btn-csv{margin-left:auto;background:#fff;border:1.5px solid #E2E8F0;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;color:#334155;transition:.15s;display:flex;align-items:center;gap:5px}
.btn-csv:hover{background:#1a472a;color:#fff;border-color:#1a472a}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:999;display:none;align-items:center;justify-content:center}
.mo.show{display:flex}
.mod{background:#fff;border-radius:20px;padding:28px 32px;max-width:380px;width:90%;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.modt{font-size:18px;font-weight:800;color:#0F172A;margin-bottom:8px}
.modb{font-size:14px;color:#64748B;margin-bottom:20px;line-height:1.8}
.moda{display:flex;gap:10px}
.modc{flex:1;padding:12px;border-radius:10px;border:1.5px solid #E2E8F0;background:#fff;color:#64748B;font-weight:700;font-size:14px;cursor:pointer}
.modok{flex:1;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:3px solid #E2E8F0;border-top-color:#6366F1;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .my-stats{grid-template-columns:1fr 1fr}
  .live-time{font-size:44px}
  .stamp-btn{padding:13px 24px;font-size:14px}
  .login-box{padding:28px 20px}
}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="cmod" class="mo"><div class="mod">
  <div class="modt">シフトを提出しますか？</div>
  <div class="modb" id="cmodbody"></div>
  <div class="moda">
    <button class="modc" onclick="Q('#cmod').classList.remove('show')">戻る</button>
    <button class="modok" onclick="doSubmit()">提出する</button>

</div></div>
<div class="loading-overlay" id="loadingOverlay" style="display:none">
  <div class="spinner"></div>
  <div style="font-size:14px;font-weight:700;color:#64748B" id="loadingMsg">同期中...</div>
</div>

<!-- LOGIN -->
<div class="login-wrap" id="loginScreen">
  <div class="login-brand">
    <div class="login-brand-icon">🏢</div>
    <div><div class="login-brand-text">STAFF SYSTEM</div><div class="login-brand-sub">Shift &amp; Timeclock</div></div>
  </div>
  <div class="login-box">
    <h2>ログイン</h2>
    <p class="sub">役割を選んでください</p>
    <div class="role-grid">
      <div class="role-card" id="roleStaff" onclick="selRole('staff')">
        <div class="ri">👤</div><div class="rn">アルバイト</div>
        <div class="rd">シフト提出・打刻・自分の履歴</div>
      </div>
      <div class="role-card" id="roleAdmin" onclick="selRole('admin')">
        <div class="ri">🔑</div><div class="rn">管理者</div>
        <div class="rd">全スタッフの管理・集計</div>
      </div>
    </div>
    <div class="login-fields" id="staffFields">
      <div class="fl"><label>スタッフを選択</label>
        <select class="fi" id="staffSelect" onchange="onStaffSelect(this.value)" style="cursor:pointer">
          <option value="">-- 名前を選んでください --</option>
        </select>
      </div>
      <div id="staffLoading" style="font-size:12px;color:#94A3B8;text-align:center;margin-top:-8px;display:none">読み込み中...</div>

    <div class="login-fields" id="adminFields">
      <div class="fl"><label>管理者パスワード</label><input type="password" class="fi" id="adminPass" placeholder="パスワード" maxlength="20"></div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()" disabled>ログイン</button>

</div>

<!-- DAY DETAIL MODAL -->
<div id="dayModal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);align-items:flex-end;justify-content:center" onclick="if(event.target===this)closeDayModal()">
  <div style="background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:24px 20px 32px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div id="dayModalTitle" style="font-size:18px;font-weight:800;color:#0F172A"></div>
      <button onclick="closeDayModal()" style="border:none;background:#F1F5F9;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;color:#64748B">×</button>
    </div>
    <div id="dayModalBody"></div>
  </div>
</div>
<!-- APP -->
<div class="app" id="appShell">
  <div class="topbar" id="topbar">
    <div class="tb-brand"><div class="tb-brand-icon" id="tbIcon"></div><span id="tbTitle"></span></div>
    <div class="tb-right">
      <span id="syncStatus" title="同期状態"><span class="sync-dot" id="syncDot"></span></span>
      <button id="refreshBtn" onclick="manualRefresh()" title="手動更新" style="display:none;border:none;background:rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:5px 10px;font-size:16px;cursor:pointer;line-height:1">🔄</button>
      <div class="user-pill"><div class="user-av" id="userAv"></div><span class="user-name" id="userName"></span></div>
      <button class="btn-out" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="tabs-wrap"><div class="tabs-inner" id="tabsInner"></div></div>
  <div class="wrap" id="mainWrap">
    <div class="tc" id="t-punch"></div>
    <div class="tc" id="t-myhistory"></div>
    <div class="tc" id="t-submit"></div>
    <div class="tc" id="t-view"></div>
    <div class="tc" id="t-settings"></div>
    <div class="tc" id="t-overview"></div>
    <div class="tc" id="t-calendar"></div>
    <div class="tc" id="t-detail"></div>
    <div class="tc" id="t-actual"></div>
    <div class="tc" id="t-summary"></div>
    <div class="tc" id="t-allhistory"></div>
    <div class="tc" id="t-stafflist"></div>
    <div class="tc" id="t-adminsettings"></div>
  </div>
</div>

<script>
// =============================================
// ★ jsonbin.io APIキー（後から設定）
// ★ 空のままでもlocalStorageで動作します
// =============================================
const API_KEY = '$2a$10$EzzTwrJH7puxptWXBIg/lu7qbmEBZpcM2.JyytyU/lQpNEDdzM2sG'; // ← ここにjsonbin.ioのAPIキーを入力
const BIN_URL = 'https://api.jsonbin.io/v3/b';
// =============================================

let ADMIN_PASS = localStorage.getItem('admin-pass') || '1234';
function getAdminPass() { return ADMIN_PASS; }
const Q = s => document.querySelector(s);
const QA = s => document.querySelectorAll(s);
const DJ = ['日','月','火','水','木','金','土'];
const MJ = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const PR = [
  {id:'full',label:'フル',time:'11:00〜21:00',start:'11:00',end:'21:00',color:'#7C3AED',bg:'#EDE9FE',hours:9},
  {id:'afternoon6',label:'午後6h',time:'15:00〜21:00',start:'15:00',end:'21:00',color:'#0EA5E9',bg:'#E0F2FE',hours:6},
  {id:'evening4',label:'夕方4h',time:'17:00〜21:00',start:'17:00',end:'21:00',color:'#3B82F6',bg:'#DBEAFE',hours:4},
  {id:'night2',label:'夜2h',time:'19:00〜21:00',start:'19:00',end:'21:00',color:'#EC4899',bg:'#FCE7F3',hours:2}
];
const ALEG = [...PR, {id:'custom',label:'カスタム',color:'#F59E0B',bg:'#FEF3C7'}];
const TM = [];
for(let h=8;h<=24;h++) for(let m=0;m<60;m+=30){if(h===24&&m>0)break;TM.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);}
const STAT_OPTS = [{v:'normal',l:'通常'},{v:'late',l:'遅刻'},{v:'early',l:'早退'},{v:'absent',l:'欠勤'},{v:'added',l:'追加シフト'}];
const ST = {pending:{label:'未承認',color:'#F59E0B',bg:'#FEF3C7'},approved:{label:'承認済',color:'#059669',bg:'#D1FAE5'}};

// =============================================
// DATA — localStorage版（jsonbin未設定時）
// APIキーが設定されたら自動でクラウド同期に切り替わります
// =============================================
const LS_KEY = 'staffsystem-data';

let BIN_ID = localStorage.getItem('sys-bin-id') || null;
let autoRefreshTimer = null;
let cloudData = loadLocalData();
let isSaving = false;
let saveQueue = false;

function loadLocalData() {
  try {
    const d = JSON.parse(localStorage.getItem(LS_KEY));
    if (d) {
      if (!d.shifts) d.shifts = {};
      if (!d.statuses) d.statuses = {};
      if (!d.actuals) d.actuals = {};
      if (!d.timeclock) d.timeclock = { records: [], active: {} };
      if (!d.timeclock.records) d.timeclock.records = [];
      if (!d.timeclock.active) d.timeclock.active = {};
      if (!d.staffList) d.staffList = [];
      return d;
    }
  } catch {}
  return { shifts: {}, statuses: {}, actuals: {}, timeclock: { records: [], active: {} }, staffList: [] };
}

function saveLocal() {
  localStorage.setItem(LS_KEY, JSON.stringify(cloudData));
}

function useCloud() {
  return API_KEY && API_KEY.length > 10;
}

async function initBin() {
  if (!useCloud()) return false;
  if (BIN_ID) return true;
  try {
    const r = await fetch('https://api.jsonbin.io/v3/c/uncategorized/bins', { headers: {'X-Master-Key': API_KEY} });
    if (r.ok) {
      const j = await r.json();
      if (Array.isArray(j)) {
        const b = j.find(x => x.snippetMeta?.name === 'staff-system-v2');
        if (b) { BIN_ID = b.record; localStorage.setItem('sys-bin-id', BIN_ID); return true; }
      }
    }
  } catch {}
  try {
    const r = await fetch(BIN_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Name':'staff-system-v2','X-Bin-Private':'true'},
      body: JSON.stringify(cloudData)
    });
    const j = await r.json();
    if (j.metadata?.id) { BIN_ID = j.metadata.id; localStorage.setItem('sys-bin-id', BIN_ID); return true; }
  } catch {}
  return false;
}

async function fetchCloud() {
  if (!useCloud() || !BIN_ID) { setSyncStatus('local'); return false; }
  setSyncStatus('syncing');
  try {
    const r = await fetch(`${BIN_URL}/${BIN_ID}/latest`, { headers: {'X-Master-Key': API_KEY} });
    const j = await r.json();
    if (j.record) {
      cloudData = j.record;
      if (!cloudData.shifts) cloudData.shifts = {};
      if (!cloudData.statuses) cloudData.statuses = {};
      if (!cloudData.actuals) cloudData.actuals = {};
      if (!cloudData.timeclock) cloudData.timeclock = { records: [], active: {} };
      if (!cloudData.timeclock.records) cloudData.timeclock.records = [];
      if (!cloudData.timeclock.active) cloudData.timeclock.active = {};
      if (!cloudData.staffList) cloudData.staffList = [];
      saveLocal();
    }
    setSyncStatus('ok');
    return true;
  } catch (e) {
    setSyncStatus('err');
    return false;
  }
}

async function saveCloud() {
  saveLocal(); // 常にlocalStorageに保存
  if (!useCloud() || !BIN_ID) { setSyncStatus('local'); return; }
  if (isSaving) { saveQueue = true; return; }
  isSaving = true;
  setSyncStatus('syncing');
  try {
    const r = await fetch(`${BIN_URL}/${BIN_ID}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json','X-Master-Key':API_KEY},
      body: JSON.stringify(cloudData)
    });
    if (r.ok) setSyncStatus('ok'); else setSyncStatus('err');
  } catch { setSyncStatus('err'); }
  isSaving = false;
  if (saveQueue) { saveQueue = false; saveCloud(); }
}

function setSyncStatus(s) {
  const d = Q('#syncDot');
  if (!d) return;
  if (s === 'local') { d.className='sync-dot'; d.style.background='#94A3B8'; d.title='ローカル保存'; }
  else if (s === 'syncing') { d.className='sync-dot syncing'; d.style.background=''; d.title='同期中'; }
  else if (s === 'err') { d.className='sync-dot err'; d.style.background=''; d.title='同期エラー'; }
  else { d.className='sync-dot'; d.style.background=''; d.title='クラウド同期済み'; }
}

function showLoading(msg = '読み込み中...') { Q('#loadingOverlay').style.display='flex'; Q('#loadingMsg').textContent=msg; }
function hideLoading() { Q('#loadingOverlay').style.display='none'; }

// =============================================
// HELPERS
// =============================================
function pad(n) { return String(n).padStart(2,'0'); }
function cH(s,e) { if(!s||!e)return 0; const[a,b]=s.split(':').map(Number),[c,d]=e.split(':').map(Number); const x=a*60+b,y=c*60+d; let t=Math.max(0,(y-x)/60); if(x<840&&y>900)t-=1; return t; }
function gD(en) { if(!en)return null; if(en.type==='custom')return{label:'カスタム',time:`${en.start}〜${en.end}`,start:en.start,end:en.end,color:'#F59E0B',bg:'#FEF3C7',hours:cH(en.start,en.end)}; const p=PR.find(x=>x.id===en.type); return p?{...p}:null; }
function toDateStr(d) { return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function toTimeStr(d) { return`${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function diffHours(a,b) { return Math.floor((new Date(b)-new Date(a))/1000)/3600; }
function fmtH(h) { if(h==null)return'—'; return`${Math.floor(h)}h${pad(Math.floor((h-Math.floor(h))*60))}m`; }
function toast(m,t='ok') { const el=Q('#toast'); el.textContent=m; el.className='toast show '+t; setTimeout(()=>el.classList.remove('show'),3000); }

const now0 = new Date();
let Y = now0.getFullYear(), M = now0.getMonth();
let shifts = {}, selDay = null, isSub = false;
let subs = [], selStaff = null, selActDay = now0.getDate();
let currentUser = null;
let clockTimer = null;

function mk() { return`${Y}-${M}`; }
function mkey() { return`${Y}-${pad(M+1)}`; }
function fD() { return`${Y}年${MJ[M]}`; }
function dim() { return new Date(Y,M+1,0).getDate(); }
function dow(d) { return new Date(Y,M,d).getDay(); }
function gS(n) { return cloudData.statuses[`${mkey()}_${n}`] || 'pending'; }

function updSt(n,s) {
  cloudData.statuses[`${mkey()}_${n}`] = s;
  saveCloud();
  renderAdmin();
  toast(s==='approved'?'承認しました':'未承認に戻しました', s==='approved'?'ok':'inf');
}

function gDaySum(day) {
  const r=[];
  subs.filter(s=>gS(s.name)==='approved').forEach(s=>{
    const en=s.shifts?.[`${mk()}-${day}`];
    if(en){const d=gD(en);if(d)r.push({name:s.name,...d});}
  });
  return r;
}

function allNames() {
  const s=new Set();
  // スタッフ管理で登録された一覧
  (cloudData.staffList||[]).forEach(n=>s.add(n));
  // シフト提出済み
  subs.forEach(x=>s.add(x.name));
  // 追加実働
  Object.keys(cloudData.actuals).forEach(k=>{
    if(cloudData.actuals[k].status==='added') s.add(k.replace(/_\d+$/,'').replace(`${mkey()}_`,''));
  });
  return [...s].sort();
}

function loadSubsFromCloud() {
  subs = [];
  Object.keys(cloudData.shifts).forEach(k => {
    if (k.startsWith(mkey()+'_')) subs.push(cloudData.shifts[k]);
  });
}

// =============================================
// LOGIN
// =============================================
let selRoleVal = null;

function selRole(r) {
  selRoleVal = r;
  Q('#roleStaff').classList.toggle('sel', r==='staff');
  Q('#roleAdmin').classList.toggle('sel', r==='admin');
  Q('#staffFields').classList.toggle('show', r==='staff');
  Q('#adminFields').classList.toggle('show', r==='admin');
  Q('#loginBtn').disabled = true; // will be enabled after selection
  Q('#loginErr').style.display = 'none';
  if (r==='staff') {
    loadStaffList();
  } else {
    Q('#loginBtn').disabled = false;
    setTimeout(()=>Q('#adminPass').focus(),50);
  }
}

document.getElementById('adminPass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

function onStaffSelect(val) {
  Q('#loginBtn').disabled = !val;
}

// Fetch staff list from cloud and populate dropdown
async function loadStaffList() {
  const sel = Q('#staffSelect');
  const lbl = Q('#staffLoading');
  if (lbl) lbl.style.display = 'none';

  // まずlocalStorageのデータをすぐ表示
  let names = cloudData.staffList || [];

  // クラウドが設定されていれば最新を取得
  if (useCloud()) {
    sel.innerHTML = '<option value="">-- 読み込み中... --</option>';
    if (lbl) lbl.style.display = 'block';
    Q('#loginBtn').disabled = true;
    try {
      const ok = await initBin();
      if (ok) {
        const r = await fetch(`${BIN_URL}/${BIN_ID}/latest`, { headers: {'X-Master-Key': API_KEY} });
        const j = await r.json();
        if (j.record?.staffList) {
          names = j.record.staffList;
          cloudData.staffList = names;
          saveLocal();
        }
      }
    } catch {}
    if (lbl) lbl.style.display = 'none';
  }

  if (names.length) {
    sel.innerHTML = '<option value="">-- 名前を選んでください --</option>';
    names.forEach(n => {
      const o = document.createElement('option');
      o.value = n; o.textContent = n;
      sel.appendChild(o);
    });
    Q('#loginBtn').disabled = true; // onStaffSelectで有効化
  } else {
    sel.innerHTML = '<option value="">（管理者にスタッフ登録を依頼してください）</option>';
    Q('#loginBtn').disabled = true;
  }
  sel.focus();
}

async function doLogin() {
  const err = Q('#loginErr'); err.style.display='none';
  if (!selRoleVal) { err.textContent='役割を選んでください'; err.style.display='block'; return; }
  if (selRoleVal==='staff') {
    let name = Q('#staffSelect')?.value || '';
    if (!name) { err.textContent='名前を選んでください'; err.style.display='block'; return; }
    currentUser = {role:'staff', name};
  } else {
    const pass = Q('#adminPass').value;
    if (pass !== ADMIN_PASS) { err.textContent='パスワードが違います'; err.style.display='block'; Q('#adminPass').value=''; return; }
    currentUser = {role:'admin', name:'管理者'};
  }
  launchApp();
  if (useCloud()) {
    initBin().then(ok => {
      if (ok) fetchCloud().then(() => {
        if (currentUser.role==='staff') loadStaffShiftFromCloud();
        else { loadSubsFromCloud(); renderAdmin(); }
      });
    });
  }
}

function doLogout() {
  currentUser = null; selRoleVal = null;
  stopClock();
  stopAutoRefresh();
  const rb = Q('#refreshBtn'); if (rb) rb.style.display = 'none';
  Q('#loginScreen').style.display='flex';
  Q('#appShell').classList.remove('on');
  Q('#staffSelect').value=''; Q('#adminPass').value='';
  Q('#roleStaff').classList.remove('sel'); Q('#roleAdmin').classList.remove('sel');
  Q('#staffFields').classList.remove('show'); Q('#adminFields').classList.remove('show');
  Q('#loginBtn').disabled=true;
}

// =============================================
// LAUNCH
// =============================================
function startClock() {
  clockTimer = setInterval(()=>{
    const n=new Date();
    const cl=Q('#liveClock'); if(cl) cl.textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
    const dl=Q('#liveDate'); if(dl) dl.textContent=`${n.getFullYear()}年${pad(n.getMonth()+1)}月${pad(n.getDate())}日（${DJ[n.getDay()]}）`;
    // 経過時間をリアルタイム更新
    const elEl=Q('#elapsedTime');
    if(elEl && currentUser){
      const tc=cloudData.timeclock;
      const active=tc.active[currentUser.name];
      if(active){
        const elapsed=diffHours(active.inTime, n.toISOString());
        elEl.textContent=fmtH(elapsed);
      }
    }
  },1000);
}
function stopClock() { clearInterval(clockTimer); }

// 管理者用自動更新（30秒ごと）
async function manualRefresh() {
  const btn = Q('#refreshBtn');
  if (btn) { btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none'; }
  if (useCloud()) {
    const ok = await fetchCloud();
    if (ok) { loadSubsFromCloud(); renderAdmin(); }
  } else {
    loadSubsFromCloud(); renderAdmin();
  }
  if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = ''; }
  toast('🔄 更新しました', 'inf');
}

function startAutoRefresh() {
  stopAutoRefresh();
  autoRefreshTimer = setInterval(async () => {
    if (!currentUser || currentUser.role !== 'admin') return;
    if (!useCloud()) return;
    const ok = await fetchCloud();
    if (ok) {
      loadSubsFromCloud();
      const activeTab = Q('.tbtn.on')?.textContent?.trim();
      // 現在表示中のタブだけ再描画
      if (activeTab?.includes('シフト一覧')) renderAdmin();
      else if (activeTab?.includes('カレンダー')) rCalAdmin();
      else if (activeTab?.includes('打刻履歴')) renderAllHistory();
      else if (activeTab?.includes('月次集計')) rSum();
      // 更新インジケーター点滅
      const dot = Q('#syncDot');
      if (dot) { dot.style.transform='scale(1.4)'; setTimeout(()=>dot.style.transform='',300); }
    }
  }, 30000);
}
function stopAutoRefresh() { if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; } }

function launchApp() {
  Q('#loginScreen').style.display='none';
  Q('#appShell').classList.add('on');
  const bar = Q('#topbar');
  if (currentUser.role==='staff') {
    bar.className='topbar staff-bar';
    Q('#tbIcon').textContent='📅'; Q('#tbTitle').textContent='スタッフポータル';
    Q('#tabsInner').innerHTML=`
      <button class="tbtn on green" onclick="showTab('punch')">⏱ 打刻</button>
      <button class="tbtn" onclick="showTab('submit')">📝 シフト提出</button>
      <button class="tbtn" onclick="showTab('view')">📋 シフト確認</button>
      <button class="tbtn" onclick="showTab('myhistory')">🕐 勤務履歴</button>
      <button class="tbtn" onclick="showTab('settings')">⚙️ 設定</button>`;
    loadStaffShiftFromCloud();
    showTab('punch');
    startClock();
  } else {
    bar.className='topbar admin-bar';
    Q('#tbIcon').textContent='🏢'; Q('#tbTitle').textContent='管理者ダッシュボード';
    Q('#tabsInner').innerHTML=`
      <button class="tbtn on" onclick="showTab('overview')">📊 シフト一覧</button>
      <button class="tbtn" onclick="showTab('calendar')">📅 カレンダー</button>
      <button class="tbtn" onclick="showTab('detail')">👤 個人詳細</button>
      <button class="tbtn" onclick="showTab('actual')">⏱ 実働管理</button>
      <button class="tbtn" onclick="showTab('summary')">📈 月次集計</button>
      <button class="tbtn" onclick="showTab('allhistory')">🗂 打刻履歴</button>
      <button class="tbtn" onclick="showTab('stafflist')">👥 スタッフ管理</button>
      <button class="tbtn" onclick="showTab('adminsettings')">⚙️ 管理者設定</button>`;
    loadSubsFromCloud();
    startAutoRefresh();
    Q('#refreshBtn').style.display = 'block';
    showTab('overview');
  }
  Q('#userAv').textContent = currentUser.name.charAt(0);
  Q('#userName').textContent = currentUser.name;
}

// =============================================
// TAB
// =============================================
const STAFF_TABS = ['punch','submit','view','myhistory','settings'];
const ADMIN_TABS = ['overview','calendar','detail','actual','summary','allhistory','stafflist','adminsettings'];
function showTab(id) {
  QA('.tc').forEach(e=>e.classList.remove('on'));
  QA('.tbtn').forEach(e=>e.classList.remove('on'));
  Q('#t-'+id).classList.add('on');
  const list = currentUser.role==='staff' ? STAFF_TABS : ADMIN_TABS;
  const idx = list.indexOf(id);
  if (idx>=0) QA('.tbtn')[idx].classList.add('on');

  let statusHtml = '';

    statusHtml = `<div class="status-bar"><div class="status-dot"></div><span>出勤中</span><span style="color:#2d6a4f;margin-left:8px;font-size:12px">${toTimeStr(inD)} 出勤 ／ 経過 <span id="elapsedTime">${fmtH(elapsed)}</span></span></div>`;
  }

      <div class="live-time" id="liveClock">--:--:--</div>

      <div class="stamp-row">
        <button class="stamp-btn stamp-in" onclick="doStamp('in')" ${isIn?'disabled':''}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg>
          出勤
        </button>
        <button class="stamp-btn stamp-out" onclick="doStamp('out')" ${!isIn?'disabled':''}>
          退勤
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </button>
      </div>
    </div>
    ${shiftBadge}${statusHtml}`;
  const n=new Date();
  const cl=Q('#liveClock'); if(cl) cl.textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  const dl=Q('#liveDate'); if(dl) dl.textContent=`${n.getFullYear()}年${pad(n.getMonth()+1)}月${pad(n.getDate())}日（${DJ[n.getDay()]}）`;
}

async function doStamp(type) {
  const name = currentUser.name;
  const tc = cloudData.timeclock;
  const now = new Date();
  const timeStr = now.toISOString();
  const dateStr = toDateStr(now);
  // Re-fetch first to avoid overwriting
  await fetchCloud();
  const tc2 = cloudData.timeclock;
  if (type==='in') {
    if (tc2.active[name]) { toast('⚠️ すでに出勤中です','err'); return; }
    cloudData.timeclock.active[name] = { inTime: timeStr, date: dateStr };
    toast(`✅ おはようございます、${name} さん！`);
  } else {
    if (!tc2.active[name]) { toast('⚠️ 出勤記録がありません','err'); return; }
    const hours = diffHours(tc2.active[name].inTime, timeStr);
    cloudData.timeclock.records.push({ name, date: dateStr, inTime: tc2.active[name].inTime, outTime: timeStr, hours });
    delete cloudData.timeclock.active[name];
    toast(`👋 お疲れ様でした！（${fmtH(hours)}）`);
  }
  saveCloud();
  renderPunch();
}

function rShiftCal() {
  const g=Q('#cg'); if(!g)return; g.innerHTML='';
  const ds=dim(), f=dow(1);
  const todayD=now0.getDate(), todayM=now0.getMonth(), todayY=now0.getFullYear();
  for(let i=0;i<f;i++){const d=document.createElement('div');d.style.minHeight='68px';g.appendChild(d);}
  for(let d=1;d<=ds;d++){
    const w=dow(d),en=shifts[`${mk()}-${d}`],di=gD(en);
    const td=(d===todayD&&M===todayM&&Y===todayY),sl=selDay===d;
    const c=document.createElement('div');
    c.className='cc'+(sl?' sel':'')+(td?' td':'');
    if(di&&!sl){c.style.background=di.bg;if(!td)c.style.borderColor=di.color+'33';}
    else if(!sl)c.style.background=w===0?'#FFF5F5':w===6?'#F0F5FF':'#F8FAFC';
    c.onclick=()=>{if(!isSub){selDay=selDay===d?null:d;if(selDay)opk();else cpk();renderShift();}};
    const dd=document.createElement('div');dd.className='cd';dd.style.color=w===0?'#DC2626':w===6?'#2563EB':'#334155';dd.textContent=d;c.appendChild(dd);
    if(di){const s=document.createElement('div');s.className='cs';s.style.color=di.color;s.textContent=di.label;if(di.time){const t=document.createElement('div');t.className='cst';t.style.color=di.color;t.textContent=di.time;s.appendChild(t);}c.appendChild(s);}
    const dateKey=`${Y}-${pad(M+1)}-${pad(d)}`;

    if(hasRecord){const dot=document.createElement('div');dot.className='ctc';c.appendChild(dot);}
    g.appendChild(c);
  }
}

function opk() {
  const pk=Q('#pk'); if(!pk)return; pk.classList.add('show');
  const d=selDay,w=dow(d);Q('#pkt').textContent=`${M+1}/${d}（${DJ[w]}）のシフト`;
  const cur=shifts[`${mk()}-${d}`],g=Q('#pg');g.innerHTML='';
  PR.forEach(p=>{const a=cur?.type===p.id;const b=document.createElement('button');b.className='pbtn'+(a?' on':'');if(a){b.style.borderColor=p.color;b.style.background=p.bg;}b.innerHTML=`<div style="font-size:13px;font-weight:700;color:${a?p.color:'#334155'}">${p.label}</div><div style="font-size:10px;margin-top:2px;color:${a?p.color:'#94A3B8'}">${p.time}</div>`;b.onclick=()=>{const k=`${mk()}-${d}`;if(a)delete shifts[k];else shifts[k]={type:p.id,start:p.start,end:p.end};renderShift();opk();};g.appendChild(b);});
  Q('#cbox').classList.toggle('on',cur?.type==='custom');
  if(Q('#cstart'))Q('#cstart').value=cur?.type==='custom'?cur.start:'11:00';
  if(Q('#cend'))Q('#cend').value=cur?.type==='custom'?cur.end:'21:00';

function handleSub() {
  const ek=Object.keys(shifts).filter(k=>k.startsWith(mk()+'-'));
  if(!ek.length){toast('シフトを1日以上入力してください','err');return;}
  const wc=ek.length,th=Math.round(ek.reduce((s,k)=>(gD(shifts[k])?.hours||0)+s,0)*10)/10;

  Q('#cmod').classList.add('show');

async function doSubmit() {
  Q('#cmod').classList.remove('show');
  const name = currentUser.name;
  const ek=Object.keys(shifts).filter(k=>k.startsWith(mk()+'-'));
  const wc=ek.length,th=Math.round(ek.reduce((s,k)=>(gD(shifts[k])?.hours||0)+s,0)*10)/10;
  const key = `${mkey()}_${name.replace(/\s/g,'_')}`;
  cloudData.shifts[key] = { name, month:mkey(), shifts:{...shifts}, note:Q('#note')?.value||'', submittedAt:new Date().toISOString(), workCount:wc, totalHours:th };
  await saveCloud();
  isSub=true; renderShift(); toast('シフトを提出しました！');
}

function delSubBtn(btn) {

    btn.style.color = '#fff';

function rAct() {
  const el = Q('#t-actual'); if (!el) return;

  // 月合計稼働時間を計算
  let monthTotalActH = 0, monthTotalPlanH = 0;
  for (let d = 1; d <= ds; d++) {
    names.forEach(name => {
      const a = cloudData.actuals[`${mkey()}_${name}_${d}`];
      if (a && a.status !== 'absent' && a.start && a.end) monthTotalActH += cH(a.start, a.end);
      const en = subs.find(s=>s.name===name)?.shifts?.[`${mk()}-${d}`];
      const di = gD(en); if (di) monthTotalPlanH += di.hours;
    });
  }

  // 選択日の合計稼働
  let dayTotalActH = 0, dayTotalPlanH = 0;
  const dateKey0 = `${Y}-${pad(M+1)}-${pad(selActDay)}`;
  const tcRecsDay = cloudData.timeclock.records.filter(r => r.date === dateKey0);
  const dayTcH = tcRecsDay.reduce((s,r)=>s+(r.hours||0), 0);

  for (let d = 1; d <= ds; d++) { const dw = dow(d); h += `<option value="${d}"${d === selActDay ? ' selected' : ''}>${M+1}/${d}（${DJ[dw]}）</option>`; }

function renderActDay(day) {
  const el = Q('#t-actual'); if (!el) return;
  const names = allNames();
  const existing = el.querySelector('.act-day-body');
  if (existing) existing.remove();

  const wrap = document.createElement('div');
  wrap.className = 'act-day-body';

  const dateKey = `${Y}-${pad(M+1)}-${pad(day)}`;
  const tcRecs = cloudData.timeclock.records.filter(r => r.date === dateKey);
  const planned = gDaySum(day);
  const plannedNames = planned.map(p => p.name);
  const actKey = (n, d) => `${mkey()}_${n}_${d}`;

  // 打刻記録バナー
  if (tcRecs.length) {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#D1FAE5;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#065F46;font-weight:700';
    banner.textContent = '🟢 打刻記録: ' + tcRecs.map(r => `${r.name} ${toTimeStr(new Date(r.inTime))}〜${toTimeStr(new Date(r.outTime))}`).join(' / ');
    wrap.appendChild(banner);
  }

  // シフト予定あり
  if (planned.length) {
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:12px;font-weight:700;color:#64748B;margin-bottom:8px';
    lbl.textContent = '📋 シフト予定あり';
    wrap.appendChild(lbl);

    planned.forEach(p => {
      const ak = actKey(p.name, day);
      const a = cloudData.actuals[ak];
      const tcR = tcRecs.find(r => r.name === p.name);
      const card = document.createElement('div');
      card.className = 'acard';

      // 打刻ヒント
      if (tcR) {
        const hint = document.createElement('div');
        hint.style.cssText = 'font-size:11px;color:#059669;margin-bottom:8px;font-weight:600';
        hint.textContent = `📍 打刻: ${toTimeStr(new Date(tcR.inTime))}〜${toTimeStr(new Date(tcR.outTime))} (${fmtH(tcR.hours)})`;
        card.appendChild(hint);
      }

      // 名前 + 予定
      const topRow = document.createElement('div');
      topRow.className = 'arow';
      topRow.style.marginBottom = '10px';
      topRow.innerHTML = `<div class="aname">${p.name}</div><div style="font-size:10px;color:#94A3B8;background:#F1F5F9;padding:2px 8px;border-radius:4px">予定: ${p.time}</div>`;
      card.appendChild(topRow);

      // ステータスによって表示切替
      if (!a) {
        // 未入力 → ボタン群
        const btns = document.createElement('div');
        btns.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap';
        const btnStyles = [
          { status:'normal', label:'✅ 予定通り', bg:'#D1FAE5', color:'#065F46', border:'#6EE7B7' },
          { status:'change', label:'⏱ 時間変更',  bg:'#EDE9FE', color:'#7C3AED', border:'#C4B5FD' },
          { status:'late',   label:'⏰ 遅刻',     bg:'#FEF3C7', color:'#B45309', border:'#FCD34D' },
          { status:'early',  label:'🏃 早退',     bg:'#FEF3C7', color:'#B45309', border:'#FCD34D' },
          { status:'absent', label:'❌ 休み',     bg:'#FEE2E2', color:'#DC2626', border:'#FCA5A5' },
        ];
        btnStyles.forEach(bs => {
          const btn = document.createElement('button');
          btn.textContent = bs.label;
          btn.style.cssText = `padding:8px 12px;border-radius:10px;border:1.5px solid ${bs.border};background:${bs.bg};color:${bs.color};font-size:12px;font-weight:800;cursor:pointer`;
          btn.addEventListener('click', () => applyActStatus(p, day, bs.status, tcR));
          btns.appendChild(btn);
        });
        card.appendChild(btns);
      } else {
        // 入力済み → ステータス表示 + 詳細 + リセット
        const statusLabels = { normal:'✅ 予定通り', change:'⏱ 時間変更', late:'⏰ 遅刻', early:'🏃 早退', absent:'❌ 休み', added:'➕ 追加' };
        const statusColors = { normal:'#065F46', change:'#7C3AED', late:'#B45309', early:'#B45309', absent:'#DC2626', added:'#7C3AED' };
        const statusBgs    = { normal:'#D1FAE5',  change:'#EDE9FE', late:'#FEF3C7', early:'#FEF3C7', absent:'#FEE2E2', added:'#EDE9FE' };
        const st = a.status || 'normal';

        const statRow = document.createElement('div');
        statRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap';
        statRow.innerHTML = `<span style="background:${statusBgs[st]};color:${statusColors[st]};padding:4px 12px;border-radius:8px;font-size:12px;font-weight:800">${statusLabels[st]||st}</span>`;
        if (a.start && a.end) {
          statRow.innerHTML += `<span style="font-size:13px;font-weight:700;color:#0F172A">${a.start}〜${a.end}</span><span style="font-size:12px;color:#6366F1;font-weight:800">${cH(a.start,a.end)}h</span>`;
        }
        card.appendChild(statRow);

        // 時間修正エリア（休み以外）
        if (st !== 'absent') {
          const timeRow = document.createElement('div');
          timeRow.className = 'arow';
          timeRow.style.marginBottom = '6px';
          timeRow.innerHTML = `
            <select class="asel" onchange="setActField('${p.name}',${day},'start',this.value)">
              <option value="">開始修正</option>${TM.map(t=>`<option value="${t}"${a.start===t?' selected':''}>${t}</option>`).join('')}
            </select>
            <span style="font-size:12px;color:#94A3B8">〜</span>
            <select class="asel" onchange="setActField('${p.name}',${day},'end',this.value)">
              <option value="">終了修正</option>${TM.map(t=>`<option value="${t}"${a.end===t?' selected':''}>${t}</option>`).join('')}
            </select>
            <select class="astatus" onchange="setActField('${p.name}',${day},'status',this.value)">
              ${[{v:'normal',l:'予定通り'},{v:'change',l:'時間変更'},{v:'late',l:'遅刻'},{v:'early',l:'早退'}].map(o=>`<option value="${o.v}"${a.status===o.v?' selected':''}>${o.l}</option>`).join('')}
            </select>`;
          card.appendChild(timeRow);
        }

        // リセットボタン
        const resetBtn = document.createElement('button');
        resetBtn.textContent = '↩ リセット';
        resetBtn.style.cssText = 'border:none;background:none;color:#94A3B8;font-size:11px;font-weight:700;cursor:pointer;padding:2px 0';
        resetBtn.addEventListener('click', () => { delete cloudData.actuals[ak]; saveCloud(); renderActDay(day); });
        card.appendChild(resetBtn);
      }
      wrap.appendChild(card);
    });
  }

  // 追加・予定外出勤
  const addedKeys = Object.keys(cloudData.actuals).filter(k => k.startsWith(mkey()+'_') && k.endsWith('_'+day) && cloudData.actuals[k].status === 'added');
  const addLbl = document.createElement('div');
  addLbl.style.cssText = 'font-size:12px;font-weight:700;color:#7C3AED;margin-top:16px;margin-bottom:8px';
  addLbl.textContent = '➕ 追加・予定外出勤';
  wrap.appendChild(addLbl);

  addedKeys.forEach(ak => {
    const name = ak.replace(`${mkey()}_`, '').replace('_'+day, '');
    if (plannedNames.includes(name)) return;
    const a = cloudData.actuals[ak];
    const card = document.createElement('div');
    card.className = 'acard';
    card.style.border = '1.5px solid #EDE9FE';
    const topRow = document.createElement('div');
    topRow.className = 'arow';
    topRow.style.marginBottom = '8px';
    topRow.innerHTML = `<div class="aname">${name}</div><div style="font-size:10px;color:#7C3AED;background:#EDE9FE;padding:2px 8px;border-radius:4px">追加</div>`;
    const delBtn = document.createElement('button');
    delBtn.textContent = '✕';
    delBtn.style.cssText = 'margin-left:auto;border:none;background:none;color:#DC2626;cursor:pointer;font-size:12px;font-weight:700';
    delBtn.addEventListener('click', () => { delete cloudData.actuals[ak]; saveCloud(); renderActDay(day); });
    topRow.appendChild(delBtn);
    card.appendChild(topRow);
    const timeRow = document.createElement('div');
    timeRow.className = 'arow';
    timeRow.innerHTML = `
      <select class="asel" onchange="setActField('${name}',${day},'start',this.value)">
        <option value="">開始</option>${TM.map(t=>`<option value="${t}"${a.start===t?' selected':''}>${t}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:#94A3B8">〜</span>
      <select class="asel" onchange="setActField('${name}',${day},'end',this.value)">
        <option value="">終了</option>${TM.map(t=>`<option value="${t}"${a.end===t?' selected':''}>${t}</option>`).join('')}
      </select>`;
    card.appendChild(timeRow);
    if (a.start && a.end) {
      const hrs = document.createElement('div');
      hrs.style.cssText = 'font-size:11px;margin-top:4px';
      hrs.innerHTML = `実働: <strong>${cH(a.start,a.end)}h</strong>`;
      card.appendChild(hrs);
    }
    wrap.appendChild(card);
  });

  // 追加登録
  const addRow = document.createElement('div');
  addRow.style.cssText = 'display:flex;gap:8px;margin-top:8px';
  const sel = document.createElement('select');
  sel.id = 'addSel';
  sel.style.cssText = 'flex:1;padding:8px;border-radius:8px;border:1.5px solid #E2E8F0;font-size:13px;background:#fff;outline:none';
  sel.innerHTML = '<option value="">スタッフを選択...</option>' +
    names.filter(n => !plannedNames.includes(n) && !addedKeys.some(k => k === actKey(n, day))).map(n => `<option value="${n}">${n}</option>`).join('');
  const addBtn = document.createElement('button');
  addBtn.className = 'asave';
  addBtn.textContent = '追加';
  addBtn.addEventListener('click', () => {
    const n = sel.value; if (!n) return;
    cloudData.actuals[`${mkey()}_${n}_${day}`] = { start:'', end:'', status:'added' };
    saveCloud(); renderActDay(day);
  });
  addRow.appendChild(sel);
  addRow.appendChild(addBtn);
  wrap.appendChild(addRow);
  el.appendChild(wrap);
}

function applyActStatus(p, day, status, tcR) {
  const ak = `${mkey()}_${p.name}_${day}`;
  if (status === 'normal') {
    // 予定通り → 予定時間をそのまま入力（打刻があれば打刻時間優先）
    const start = tcR ? toTimeStr(new Date(tcR.inTime)) : p.start;
    const end   = tcR ? toTimeStr(new Date(tcR.outTime)) : p.end;
    cloudData.actuals[ak] = { start, end, status: 'normal' };
  } else if (status === 'absent') {
    cloudData.actuals[ak] = { start:'', end:'', status:'absent' };
  } else if (status === 'change') {
    // 時間変更 → 予定時間をセットして修正できるようにする
    const start = tcR ? toTimeStr(new Date(tcR.inTime)) : p.start;
    const end   = tcR ? toTimeStr(new Date(tcR.outTime)) : p.end;
    cloudData.actuals[ak] = { start, end, status: 'change' };
  } else {
    // 遅刻・早退 → 予定時間をセットして修正できるようにする
    const start = tcR ? toTimeStr(new Date(tcR.inTime)) : p.start;
    const end   = tcR ? toTimeStr(new Date(tcR.outTime)) : p.end;
    cloudData.actuals[ak] = { start, end, status };
  }
  saveCloud();
  renderActDay(day);
}

function setActField(n, d, f, v) {
  const k = `${mkey()}_${n}_${d}`;
  if (!cloudData.actuals[k]) cloudData.actuals[k] = { start:'', end:'', status:'normal' };
  cloudData.actuals[k][f] = v;
  saveCloud();
  renderActDay(d);
}

function delActCloud(n, d) { delete cloudData.actuals[`${mkey()}_${n}_${d}`]; saveCloud(); renderActDay(d); }

  const ds=dim(),names=allNames().filter(n=>gS(n)==='approved');
  let h=monthNavHtml()+`<div style="font-size:15px;font-weight:700;color:#0F172A;margin-bottom:12px">📈 ${fD()} 月次集計</div><div style="font-size:11px;color:#059669;font-weight:700;background:#D1FAE5;padding:6px 12px;border-radius:8px;margin-bottom:12px;text-align:center">✓ 承認済みスタッフのみ表示</div>`;
  if(!names.length){el.innerHTML=h+'<div style="color:#94A3B8;text-align:center;padding:40px">承認済みのスタッフがいません</div>';return;}

  // チーム合計を先に計算
  let teamPlanT=0, teamActT=0, teamTcT=0;
  names.forEach(name=>{
    const sub2=subs.find(s=>s.name===name);
    for(let d=1;d<=ds;d++){
      const en=sub2?.shifts?.[`${mk()}-${d}`],di=gD(en);if(di)teamPlanT+=di.hours;
      const a=cloudData.actuals[`${mkey()}_${name}_${d}`];
      if(a&&a.status!=='absent'&&a.start&&a.end)teamActT+=cH(a.start,a.end);
      const dateKey=`${Y}-${pad(M+1)}-${pad(d)}`;
      const tcRec=cloudData.timeclock.records.find(r=>r.name===name&&r.date===dateKey);
      if(tcRec)teamTcT+=tcRec.hours||0;
    }
  });

  // チーム合計バナー
  h += `<div style="background:linear-gradient(135deg,#EEF2FF,#F5F3FF);border-radius:16px;padding:16px 20px;margin-bottom:16px;border:1.5px solid #C4B5FD">
    <div style="font-size:13px;font-weight:800;color:#4F46E5;margin-bottom:10px">👥 チーム合計（${fD()}）</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      <div style="text-align:center">
        <div style="font-size:22px;font-weight:800;color:#6366F1">${Math.round(teamPlanT*10)/10}<span style="font-size:12px">h</span></div>
        <div style="font-size:11px;color:#6366F1;font-weight:700;margin-top:2px">予定合計</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:22px;font-weight:800;color:#059669">${Math.round(teamActT*10)/10}<span style="font-size:12px">h</span></div>
        <div style="font-size:11px;color:#059669;font-weight:700;margin-top:2px">実働合計</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:22px;font-weight:800;color:#065F46">${Math.round(teamTcT*10)/10}<span style="font-size:12px">h</span></div>
        <div style="font-size:11px;color:#065F46;font-weight:700;margin-top:2px">打刻合計</div>
      </div>
    </div>
  </div>`;

  names.forEach(name=>{
    const sub=subs.find(s=>s.name===name);
    let planT=0,actT=0,tcT=0;
    const lateDays=[],earlyDays=[],absentDays=[],addedDays=[];
    for(let d=1;d<=ds;d++){
      const en=sub?.shifts?.[`${mk()}-${d}`],di=gD(en);if(di)planT+=di.hours;
      const a=cloudData.actuals[`${mkey()}_${name}_${d}`];
      if(a){
        if(a.status==='absent'){absentDays.push(d);}
        else if(a.start&&a.end)actT+=cH(a.start,a.end);
        if(a.status==='late')lateDays.push(d);
        if(a.status==='early')earlyDays.push(d);
        if(a.status==='added')addedDays.push(d);
      }
      const dateKey=`${Y}-${pad(M+1)}-${pad(d)}`;
      const tcRec=cloudData.timeclock.records.find(r=>r.name===name&&r.date===dateKey);
      if(tcRec)tcT+=tcRec.hours||0;
    }
    const late=lateDays.length,early=earlyDays.length,absent=absentDays.length,added=addedDays.length;
    h+=`<div class="sumcard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div class="av avs">${name[0]}</div><div style="font-size:15px;font-weight:700;color:#0F172A">${name}</div></div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px"><div style="background:#F8FAFC;border-radius:8px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:800;color:#6366F1">${Math.round(planT*10)/10}h</div><div style="font-size:10px;color:#94A3B8">予定</div></div><div style="background:#F8FAFC;border-radius:8px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:800;color:#059669">${Math.round(actT*10)/10}h</div><div style="font-size:10px;color:#94A3B8">実働（入力）</div></div><div style="background:#D1FAE5;border-radius:8px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:800;color:#065F46">${Math.round(tcT*10)/10}h</div><div style="font-size:10px;color:#065F46;font-weight:700">打刻実績</div></div></div>`;
    const tags=[];
    if(late)tags.push(`<span style="background:#FEF3C7;color:#B45309;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">⏰ 遅刻 ${late}回（${lateDays.map(d=>`${M+1}/${d}`).join('・')}）</span>`);
    if(early)tags.push(`<span style="background:#FEF3C7;color:#B45309;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">🏃 早退 ${early}回（${earlyDays.map(d=>`${M+1}/${d}`).join('・')}）</span>`);
    if(absent)tags.push(`<span style="background:#FEE2E2;color:#DC2626;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">❌ 欠勤 ${absent}回（${absentDays.map(d=>`${M+1}/${d}`).join('・')}）</span>`);
    if(added)tags.push(`<span style="background:#EDE9FE;color:#7C3AED;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">➕ 追加 ${added}回（${addedDays.map(d=>`${M+1}/${d}`).join('・')}）</span>`);
    h+=tags.length?`<div style="display:flex;gap:4px;flex-wrap:wrap">${tags.join('')}</div>`:'<div style="font-size:11px;color:#94A3B8">ステータス: 問題なし</div>';
    h+='</div>';
  });
  el.innerHTML=h;
}

// ALL HISTORY (ADMIN)
// =============================================
function renderAllHistory() {
  const el=Q('#t-allhistory'); if(!el)return;
  el.innerHTML=`
    <div class="frow">
      <input type="text" class="fi-sm" id="fName" placeholder="名前で絞り込み" oninput="filterHistory()">
      <input type="date" class="fi-sm" id="fDate" oninput="filterHistory()">
      <input type="month" class="fi-sm" id="fMonth" oninput="filterHistory()">
      <button class="btn-csv" onclick="exportCSV()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        CSV
      </button>
    </div>
    <div style="background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05)">
      <div style="padding:14px 16px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:14px;font-weight:700">打刻履歴</span>
        <span id="histCount" style="font-size:12px;color:#94A3B8"></span>
      </div>
      <table class="htable">
        <thead><tr><th>日付</th><th>名前</th><th>出勤</th><th>退勤</th><th>時間</th></tr></thead>
        <tbody id="histBody"></tbody>
      </table>
      <div id="histEmpty" style="text-align:center;padding:32px;color:#94A3B8;display:none">記録がありません</div>
    </div>`;
  filterHistory();
}

function filterHistory() {
  const nameF=(Q('#fName')?.value||'').toLowerCase();
  const dateF=Q('#fDate')?.value||'';
  const monthF=Q('#fMonth')?.value||'';
  let recs=[...cloudData.timeclock.records].reverse();
  if(nameF)recs=recs.filter(r=>r.name.toLowerCase().includes(nameF));
  if(dateF)recs=recs.filter(r=>r.date===dateF);
  if(monthF)recs=recs.filter(r=>r.date.startsWith(monthF));
  const cnt=Q('#histCount'); if(cnt)cnt.textContent=`${recs.length}件`;
  const tbody=Q('#histBody'),empty=Q('#histEmpty');
  if(!tbody)return;
  if(!recs.length){tbody.innerHTML='';if(empty)empty.style.display='block';return;}
  if(empty)empty.style.display='none';
  tbody.innerHTML=recs.map(r=>`<tr><td>${r.date}</td><td class="name-c">${r.name}</td><td>${toTimeStr(new Date(r.inTime))}</td><td>${toTimeStr(new Date(r.outTime))}</td><td class="hrs-c">${fmtH(r.hours)}</td></tr>`).join('');
}

function exportCSV() {
  const rows=[['日付','名前','出勤時刻','退勤時刻','勤務時間(h)']];
  cloudData.timeclock.records.forEach(r=>rows.push([r.date,r.name,toTimeStr(new Date(r.inTime)),toTimeStr(new Date(r.outTime)),r.hours.toFixed(2)]));
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`打刻記録_${toDateStr(new Date())}.csv`; a.click();
  toast('📥 CSVをダウンロードしました');
}

// =============================================
// STAFF LIST MANAGEMENT (ADMIN)
// =============================================
function renderStaffList() {
  const el = Q('#t-stafflist'); if (!el) return;
  const list = cloudData.staffList || [];

  el.innerHTML = `
    <div class="stc">
      <div class="stt">👥 スタッフ管理</div>
      <div style="background:#DBEAFE;border-radius:10px;padding:10px 14px;font-size:12px;color:#1E40AF;margin-bottom:20px;font-weight:600">
        ここで登録した名前がアルバイトのログイン選択肢に表示されます。削除しても過去のシフト・打刻データは残ります。
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <input type="text" id="newStaffInput" class="finp" placeholder="スタッフ名を入力（例：山田 太郎）" style="flex:1"
          onkeydown="if(event.key==='Enter')addStaffToList()">
        <button onclick="addStaffToList()" style="padding:10px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-weight:800;font-size:14px;cursor:pointer;white-space:nowrap">追加</button>
      </div>
      <div id="staffListItems"></div>
    </div>`;

  const items = Q('#staffListItems');
  if (list.length === 0) {
    items.innerHTML = '<div style="text-align:center;padding:32px;color:#94A3B8;font-size:13px">スタッフが登録されていません</div>';
  } else {
    list.forEach(n => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;background:#F8FAFC;border-radius:10px;padding:12px 16px;margin-bottom:8px;border:1.5px solid #E2E8F0';
      row.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#F59E0B,#F97316);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px">${n.charAt(0)}</div>
          <span style="font-size:14px;font-weight:700;color:#0F172A">${n}</span>
        </div>`;
      const btn = document.createElement('button');
      btn.textContent = '削除';
      btn.style.cssText = 'border:none;background:#FEE2E2;color:#DC2626;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s';
      btn.addEventListener('click', () => {
        if (btn.dataset.confirm === '1') {
          removeStaff(n);
        } else {
          btn.dataset.confirm = '1';
          btn.textContent = '本当に削除';
          btn.style.background = '#DC2626';
          btn.style.color = '#fff';
          setTimeout(() => {
            if (btn.dataset.confirm === '1') {
              btn.dataset.confirm = '';
              btn.textContent = '削除';
              btn.style.background = '#FEE2E2';
              btn.style.color = '#DC2626';
            }
          }, 3000);
        }
      });
      row.appendChild(btn);
      items.appendChild(row);
    });
  }
  setTimeout(() => Q('#newStaffInput')?.focus(), 50);
}

async function addStaffToList() {
  const inp = Q('#newStaffInput');
  const name = inp?.value?.trim();
  if (!name) { toast('名前を入力してください','err'); return; }
  if (!cloudData.staffList) cloudData.staffList = [];
  if (cloudData.staffList.includes(name)) { toast('すでに登録されています','err'); return; }
  cloudData.staffList.push(name);
  cloudData.staffList.sort();
  await saveCloud();
  inp.value = '';
  renderStaffList();
  toast(`✅ ${name} を追加しました`);
}

async function removeStaff(name) {
  if (!cloudData.staffList) return;
  cloudData.staffList = cloudData.staffList.filter(n => n !== name);
  await saveCloud();
  renderStaffList();
  toast(`🗑 ${name} を削除しました`, 'inf');
}

// =============================================
// DAY DETAIL MODAL
// =============================================
function openDayModal(d) {
  const w = dow(d);
  const weekStr = ['日','月','火','水','木','金','土'][w];
  const dateKey = `${Y}-${pad(M+1)}-${pad(d)}`;
  const wk = gDaySum(d);

  Q('#dayModalTitle').textContent = `${M+1}月${d}日（${weekStr}）`;

  let body = '';
  if (wk.length === 0) {
    body = '<div style="text-align:center;padding:32px;color:#94A3B8;font-size:14px">承認済みシフトなし</div>';
  } else {
    // 開始時間でソート
    const sorted = [...wk].sort((a,b) => (a.start||'').localeCompare(b.start||''));
    sorted.forEach(x => {
      const tcRec = cloudData.timeclock.records.find(r => r.name===x.name && r.date===dateKey);
      const tcHtml = tcRec
        ? `<div style="font-size:11px;color:#059669;margin-top:4px;font-weight:600">🟢 実績: ${toTimeStr(new Date(tcRec.inTime))}〜${toTimeStr(new Date(tcRec.outTime))} (${fmtH(tcRec.hours)})</div>`
        : '';
      body += `
        <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #F1F5F9">
          <div style="width:36px;height:36px;border-radius:10px;background:${x.bg};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:${x.color};flex-shrink:0">${(x.name||'?')[0]}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:800;color:#0F172A">${x.name}</div>
            <div style="font-size:13px;color:${x.color};font-weight:700;margin-top:2px">${x.time || x.label} <span style="font-size:11px;background:${x.bg};padding:1px 7px;border-radius:4px">${x.label}</span></div>
            ${tcHtml}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:16px;font-weight:800;color:#6366F1">${x.hours}h</div>
          </div>
        </div>`;
    });
    const total = wk.reduce((s,x)=>s+(x.hours||0),0);
    body += `<div style="margin-top:12px;text-align:right;font-size:13px;color:#64748B;font-weight:700">合計出勤: <span style="color:#6366F1;font-size:16px">${wk.length}人 / ${total}h</span></div>`;
  }

  Q('#dayModalBody').innerHTML = body;
  const modal = Q('#dayModal');
  modal.style.display = 'flex';
  setTimeout(() => modal.querySelector('div').style.transform = 'translateY(0)', 10);
}

function closeDayModal() {
  Q('#dayModal').style.display = 'none';
}

// =============================================
// ADMIN SETTINGS
// =============================================
function renderAdminSettings() {
  const el = Q('#t-adminsettings'); if (!el) return;
  el.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'stc';

  wrap.innerHTML = `
    <div class="stt">⚙️ 管理者設定</div>

    <!-- パスワード変更 -->
    <div style="background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06)">
      <div style="font-size:15px;font-weight:800;color:#0F172A;margin-bottom:4px">🔑 管理者パスワード変更</div>
      <div style="font-size:12px;color:#94A3B8;margin-bottom:16px">現在のパスワードを確認してから変更してください</div>
      <div class="fl"><label style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.08em;display:block;margin-bottom:6px">現在のパスワード</label>
        <input type="password" id="curPass" class="fi" placeholder="現在のパスワード"></div>
      <div class="fl" style="margin-top:10px"><label style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.08em;display:block;margin-bottom:6px">新しいパスワード</label>
        <input type="password" id="newPass" class="fi" placeholder="新しいパスワード（4文字以上）"></div>
      <div class="fl" style="margin-top:10px"><label style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.08em;display:block;margin-bottom:6px">新しいパスワード（確認）</label>
        <input type="password" id="newPass2" class="fi" placeholder="もう一度入力"></div>
      <div id="passMsg" style="font-size:12px;margin-top:8px;display:none"></div>
      <button onclick="changeAdminPass()" style="margin-top:14px;width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-size:14px;font-weight:800;cursor:pointer">パスワードを変更する</button>
    </div>

    <!-- データリセット -->
    <div style="background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)">
      <div style="font-size:15px;font-weight:800;color:#DC2626;margin-bottom:4px">🗑 全データリセット</div>
      <div style="font-size:12px;color:#94A3B8;margin-bottom:8px">打刻・シフト・実働データをすべて削除します。スタッフ一覧は残ります。本番運用開始前のテストデータ削除などにご使用ください。</div>
      <div style="background:#FEF2F2;border-radius:10px;padding:10px 14px;font-size:12px;color:#DC2626;font-weight:700;margin-bottom:14px">⚠️ この操作は元に戻せません</div>
      <div class="fl" style="margin-top:4px">
        <label style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.08em;display:block;margin-bottom:6px">管理者パスワードを入力して実行</label>
        <input type="password" id="resetPass" class="fi" placeholder="パスワードを入力">
      </div>
      <div id="resetArea" style="margin-top:10px"></div>
    </div>`;

  el.appendChild(wrap);
  renderResetBtn();
}

function changeAdminPass() {
  const cur = Q('#curPass').value;
  const nw = Q('#newPass').value;
  const nw2 = Q('#newPass2').value;
  const msg = Q('#passMsg');

  const showMsg = (text, ok) => {
    msg.textContent = text;
    msg.style.color = ok ? '#059669' : '#DC2626';
    msg.style.display = 'block';
  };

  if (cur !== ADMIN_PASS) { showMsg('現在のパスワードが違います', false); return; }
  if (nw.length < 4) { showMsg('4文字以上で設定してください', false); return; }
  if (nw !== nw2) { showMsg('新しいパスワードが一致しません', false); return; }

  ADMIN_PASS = nw;
  localStorage.setItem('admin-pass', nw);
  Q('#curPass').value = '';
  Q('#newPass').value = '';
  Q('#newPass2').value = '';
  showMsg('✅ パスワードを変更しました', true);
}

function renderResetBtn() {
  const area = Q('#resetArea'); if (!area) return;
  const btn = document.createElement('button');
  btn.textContent = '全データをリセットする';
  btn.style.cssText = 'width:100%;padding:12px;border-radius:12px;border:1.5px solid #FCA5A5;background:#FEF2F2;color:#DC2626;font-size:14px;font-weight:800;cursor:pointer';
  btn.addEventListener('click', () => {
    const passInput = Q('#resetPass');
    if (!passInput || passInput.value !== ADMIN_PASS) {
      passInput.style.borderColor = '#DC2626';
      toast('パスワードが違います', 'err');
      return;
    }
    if (btn.dataset.confirm === '1') {
      resetAllData();
    } else {
      btn.dataset.confirm = '1';
      btn.textContent = '⚠️ 本当にリセット（取り消し不可）';
      btn.style.background = '#DC2626';
      btn.style.color = '#fff';
      btn.style.borderColor = '#DC2626';
      setTimeout(() => {
        if (btn.dataset.confirm === '1') {
          btn.dataset.confirm = '';
          btn.textContent = '全データをリセットする';
          btn.style.background = '#FEF2F2';
          btn.style.color = '#DC2626';
          btn.style.borderColor = '#FCA5A5';
        }
      }, 4000);
    }
  });
  area.appendChild(btn);
}

async function resetAllData() {
  cloudData.shifts = {};
  cloudData.statuses = {};
  cloudData.actuals = {};
  cloudData.timeclock = { records: [], active: {} };
  // staffListは残す
  await saveCloud();
  subs = [];
  toast('✅ データをリセットしました', 'inf');
  renderAdminSettings();
  if (Q('#resetPass')) Q('#resetPass').value = '';
}
</script>
